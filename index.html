}

function drawAsteroidField(asteroidField, strokeStyle = '#fff', lineWidth = 1.5, alpha = 1) {
    ctx.save();
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = lineWidth;
    ctx.globalAlpha = alpha;
    for (const asteroid of asteroidField) {
        ctx.save();
        ctx.translate(asteroid.x, asteroid.y);
        ctx.rotate(asteroid.angle);
        ctx.beginPath();
        for (let i = 0; i < ASTEROID_VERTICES; i++) {
            const angle = (i / ASTEROID_VERTICES) * Math.PI * 2;
            const r = asteroid.radius * asteroid.vertices[i];
            if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
            else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }
    ctx.restore();
}

function drawEnemies() {
    const greenLightOffsets = [
        { x: -34, y: -14, color: '#44ff44' },
        { x: 32, y: -12, color: '#cc44ff' },
        { x: -26, y: 14, color: '#cc44ff' },
        { x: 24, y: 16, color: '#44ff44' }
    ];
    const redLightOffsets = [
        { x: -45, y: -10, color: '#ff2222' },
        { x: 45, y: -10, color: '#ff6600' },
        { x: -35, y: 12, color: '#ff6600' },
        { x: 35, y: 12, color: '#ff2222' },
        { x: 0, y: -18, color: '#ff6600' }
    ];

    for (const enemy of enemies) {
        const isRedEnemy = enemy.type === 'red';
        const lightOffsets = isRedEnemy ? redLightOffsets : greenLightOffsets;
        const image = isRedEnemy ? enemyShipRedImg : enemyShipImg;
        const width = isRedEnemy ? RED_ENEMY_WIDTH : ENEMY_WIDTH;
        const height = isRedEnemy ? RED_ENEMY_HEIGHT : ENEMY_HEIGHT;

        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        ctx.rotate(enemy.rotWobble);
        ctx.drawImage(image, -width / 2, -height / 2, width, height);

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (let i = 0; i < lightOffsets.length; i++) {
            const light = lightOffsets[i];
            const pulse = 0.25 + (Math.sin(enemy.lightPhases[i]) + 1) * 0.35;
            ctx.fillStyle = light.color;
            ctx.globalAlpha = pulse * 0.25;
            ctx.beginPath();
            ctx.arc(light.x, light.y, 4 + pulse * 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 0.5 + pulse * 0.3;
            ctx.beginPath();
            ctx.arc(light.x, light.y, 1.8 + pulse * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
        ctx.restore();
    }

    for (const bullet of enemyBullets) {
        const isRedBullet = bullet.type === 'red' || bullet.color === 'red';
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = isRedBullet ? '#ff5522' : '#44ff88';
        ctx.globalAlpha = 0.35;
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius + 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.95;
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = isRedBullet ? '#ffd2a8' : '#cffff0';
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function getBossFrameSprite(bossObj, defeated = false) {
    if (defeated) return bossDefeatedImg;
    if (bossObj.isAngry) return bossAngryImg;
    const frameSequence = [bossFrame1, bossFrame2, bossFrame3, bossFrame3, bossFrame2, bossFrame1, bossFrame1, bossFrame2];
    return frameSequence[bossObj.frameIndex % frameSequence.length];
}

function drawBossPupils(bossObj, targetX, targetY, rotation = 0) {
    const localDx = Math.cos(-rotation) * (targetX - bossObj.x) - Math.sin(-rotation) * (targetY - bossObj.y);
    const localDy = Math.sin(-rotation) * (targetX - bossObj.x) + Math.cos(-rotation) * (targetY - bossObj.y);
    const eyeCenters = [
        { x: -bossObj.width * 0.045, y: -bossObj.height * 0.22 },
        { x: bossObj.width * 0.045, y: -bossObj.height * 0.22 }
    ];
    const pupilRadius = clamp(bossObj.width * 0.012, 5, 8);
    const travelX = bossObj.width * 0.016;
    const travelY = bossObj.height * 0.014;
    const lookLength = Math.hypot(localDx, localDy) || 1;
    const lookX = (localDx / lookLength) * travelX;
    const lookY = (localDy / lookLength) * travelY;

    ctx.save();
    for (const eye of eyeCenters) {
        const pupilX = eye.x + clamp(lookX, -travelX, travelX);
        const pupilY = eye.y + clamp(lookY, -travelY, travelY);
        ctx.fillStyle = '#2a2a35';
        ctx.beginPath();
        ctx.arc(pupilX, pupilY, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
        ctx.beginPath();
        ctx.arc(pupilX - pupilRadius * 0.28, pupilY - pupilRadius * 0.28, pupilRadius * 0.28, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawBossEntity(bossObj, defeated = false) {
    if (!bossObj) return;

    const sprite = getBossFrameSprite(bossObj, defeated);
    const phaseDamageRatio = defeated ? 1 : 1 - clamp(bossObj.phaseHp / Math.max(1, bossObj.phaseMaxHp), 0, 1);
    const wobbleRotation = defeated
        ? Math.sin(frameCount * 0.07) * 0.02
        : bossObj.isAngry
            ? Math.sin(frameCount * 0.45) * 0.08
            : Math.sin(bossObj.wobblePhase) * 0.055;
    const glowR = Math.round(255);
    const glowG = Math.round(110 - phaseDamageRatio * 78);
    const glowB = Math.round(180 - phaseDamageRatio * 130);
    const glowAlpha = defeated ? 0.38 : 0.2 + phaseDamageRatio * 0.5 + (bossObj.isAngry ? 0.16 : 0);
    const shadowBlur = defeated
        ? 12
        : Math.min(bossObj.isAngry ? 20 : 15, 8 + phaseDamageRatio * 5 + (bossObj.isAngry ? 5 : 0));
    const flashAlpha = bossObj.hitFlash > 0 ? clamp(bossObj.hitFlash / 7, 0, 1) * 0.55 : 0;
    const alpha = defeated
        ? (bossDefeatedTimer > 210 ? 1 : bossDefeatedTimer > 90 ? (bossDefeatedTimer - 90) / 120 : 0)
        : 1;
    const drawX = bossObj.x;
    const drawY = bossObj.y + (defeated ? Math.sin(frameCount * 0.08) * 4 : 0);
    const renderShake = bossObj.isAngry ? 12 : 0;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(drawX + (renderShake ? (Math.random() - 0.5) * renderShake : 0), drawY + (renderShake ? (Math.random() - 0.5) * renderShake : 0));
    ctx.rotate(wobbleRotation);
    const drawScale = bossObj.isAngry ? (bossObj.angerScale || 1) : 1;
    ctx.scale(drawScale, drawScale);

    if (sprite && sprite.complete && sprite.naturalWidth > 0) {
        // Draw boss sprite — no shadowBlur here (causes white box with source-atop)
        ctx.drawImage(sprite, -bossObj.width / 2, -bossObj.height / 2, bossObj.width, bossObj.height);

        // Damage tint and hit flash via offscreen canvas to avoid white box
        if ((!defeated && phaseDamageRatio > 0.05) || flashAlpha > 0 || bossObj.isAngry) {
            if (!bossObj._tintCanvas || bossObj._tintCanvas.width !== bossObj.width || bossObj._tintCanvas.height !== bossObj.height) {
                bossObj._tintCanvas = document.createElement('canvas');
                bossObj._tintCanvas.width = bossObj.width;
                bossObj._tintCanvas.height = bossObj.height;
            }
            const tintCanvas = bossObj._tintCanvas;
            const tCtx = tintCanvas.getContext('2d');
            tCtx.clearRect(0, 0, bossObj.width, bossObj.height);
            tCtx.drawImage(sprite, 0, 0, bossObj.width, bossObj.height);
            tCtx.globalCompositeOperation = 'source-atop';
            if (!defeated) {
                const tintAlpha = bossObj.isAngry
                    ? 0.16 + Math.sin(frameCount * 0.3) * 0.08
                    : 0.08 + phaseDamageRatio * 0.2;
                const tintG = Math.round(130 - phaseDamageRatio * 55);
                const tintB = Math.round(190 - phaseDamageRatio * 90);
                tCtx.fillStyle = bossObj.isAngry
                    ? `rgba(255, 70, 95, ${tintAlpha})`
                    : `rgba(255, ${tintG}, ${tintB}, ${tintAlpha})`;
                tCtx.fillRect(0, 0, bossObj.width, bossObj.height);
            }
            if (flashAlpha > 0) {
                tCtx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                tCtx.fillRect(0, 0, bossObj.width, bossObj.height);
            }
            ctx.drawImage(tintCanvas, -bossObj.width / 2, -bossObj.height / 2);
        }

        // Damage glow (draw a soft colored circle behind, not shadowBlur on sprite)
        if (!defeated && phaseDamageRatio > 0.1) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = glowAlpha * 0.4;
            const glowGrad = ctx.createRadialGradient(0, 0, bossObj.radius * 0.3, 0, 0, bossObj.radius * 1.1);
            glowGrad.addColorStop(0, `rgba(${glowR}, ${glowG}, ${glowB}, 0.5)`);
            glowGrad.addColorStop(1, 'rgba(255, 100, 150, 0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(0, 0, bossObj.radius * 1.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    } else {
        ctx.fillStyle = defeated ? '#f6b5cf' : '#e6c3d1';
        ctx.beginPath();
        ctx.ellipse(0, 0, bossObj.width * 0.42, bossObj.height * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    if (!defeated && !bossObj.isAngry) {
        drawBossPupils(
            bossObj,
            ship ? ship.x : bossObj.x - bossObj.width * 0.4,
            ship ? ship.y : bossObj.y,
            wobbleRotation
        );
    }

    ctx.restore();
}

let bossPortraitCache = null;
let bossPortraitCacheW = 0;
let bossPortraitCacheH = 0;

function drawBossIntroOverlay(targetCtx = ctx) {
    const introDuration = 210;
    const progress = clamp(1 - bossIntroTimer / introDuration, 0, 1);
    const portraitSide = 1;
    const portraitHeight = Math.round(canvas.height * 0.66);
    const portraitWidth = Math.round(portraitHeight * (1688 / 1125));
    const portraitTargetX = Math.round(canvas.width * (portraitSide < 0 ? 0.34 : 0.66));
    const portraitStartX = portraitSide < 0 ? Math.round(-portraitWidth * 0.45) : Math.round(canvas.width + portraitWidth * 0.45);
    const portraitEase = 1 - Math.pow(1 - clamp(progress * 1.2, 0, 1), 3);
    const portraitCenterX = Math.round(portraitStartX + (portraitTargetX - portraitStartX) * portraitEase);
    const portraitY = Math.round(canvas.height * 0.5 - portraitHeight / 2);
    const textProgress = clamp((progress - 0.18) / 0.22, 0, 1);
    const textEase = 1 - Math.pow(1 - textProgress, 3);
    const textScale = 1.7 - textEase * 0.7 + (textProgress >= 1 ? Math.sin(frameCount * 0.18) * 0.03 : 0);
    const textImpactShake = textProgress > 0 && textProgress < 0.22 ? (1 - textProgress / 0.22) * 18 : 0;
    const shakeX = Math.round(Math.sin(frameCount * 0.9) * textImpactShake * 0.35);
    const shakeY = Math.round(Math.cos(frameCount * 1.1) * textImpactShake * 0.35);
    const textX = Math.round(canvas.width / 2 + (portraitSide < 0 ? 1 : -1) * (1 - textEase) * canvas.width * 0.38);
    const textY = Math.round(canvas.height * 0.52);
    const flashAlpha = 0.12 + Math.max(0, Math.sin(progress * 20)) * 0.18;

    targetCtx.save();

    targetCtx.fillStyle = `rgba(255, 40, 70, ${flashAlpha})`;
    targetCtx.fillRect(0, 0, canvas.width, canvas.height);

    targetCtx.save();
    targetCtx.translate(Math.round(canvas.width / 2), Math.round(canvas.height / 2));
    targetCtx.rotate(portraitSide < 0 ? -0.12 : 0.12);
    for (let i = -7; i <= 7; i++) {
        const y = Math.round(i * 42 + (frameCount * 18 % 42));
        targetCtx.fillStyle = `rgba(255, 255, 255, ${0.03 + (i % 2 === 0 ? 0.04 : 0.02)})`;
        targetCtx.fillRect(-canvas.width, y, canvas.width * 2, 8);
    }
    targetCtx.restore();

    if (bossPortraitImg.complete && bossPortraitImg.naturalWidth > 0) {
        if (!bossPortraitCache || bossPortraitCacheW !== portraitWidth || bossPortraitCacheH !== portraitHeight) {
            bossPortraitCache = document.createElement('canvas');
            bossPortraitCache.width = portraitWidth;
            bossPortraitCache.height = portraitHeight;
            const portraitCtx = bossPortraitCache.getContext('2d');
            portraitCtx.clearRect(0, 0, portraitWidth, portraitHeight);
            portraitCtx.drawImage(bossPortraitImg, 0, 0, portraitWidth, portraitHeight);
            bossPortraitCacheW = portraitWidth;
            bossPortraitCacheH = portraitHeight;
        }
        targetCtx.drawImage(bossPortraitCache, portraitCenterX - Math.round(portraitWidth / 2), portraitY);
    }

    targetCtx.save();
    targetCtx.translate(textX + shakeX, textY + shakeY);
    targetCtx.scale(textScale, textScale);
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';
    targetCtx.lineJoin = 'round';
    targetCtx.strokeStyle = '#120208';
    targetCtx.lineWidth = 6;
    targetCtx.fillStyle = '#fff5f8';
    targetCtx.shadowColor = 'rgba(255, 65, 95, 0.95)';
    targetCtx.shadowBlur = 28;
    targetCtx.font = 'bold 46px Impact, Haettenschweiler, "Arial Black", sans-serif';
    targetCtx.strokeText('A CHALLENGER', 0, -30);
    targetCtx.fillText('A CHALLENGER', 0, -30);
    targetCtx.font = 'bold 72px Impact, Haettenschweiler, "Arial Black", sans-serif';
    targetCtx.strokeText('APPROACHES', 0, 38);
    targetCtx.fillText('APPROACHES', 0, 38);
    targetCtx.restore();

    targetCtx.restore();
}

function drawBossDefeatedOverlay() {
    const elapsed = 330 - bossDefeatedTimer;
    const textProgress = clamp((elapsed - 60) / 36, 0, 1);
    if (textProgress <= 0) return;

    const slideSide = bossNumber % 2 === 0 ? -1 : 1;
    const startX = slideSide < 0 ? -canvas.width * 0.4 : canvas.width * 1.4;
    const textEase = 1 - Math.pow(1 - textProgress, 3);
    const textX = startX + (canvas.width / 2 - startX) * textEase;
    const slamShake = textProgress < 0.22 ? (1 - textProgress / 0.22) * 16 : 0;

    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.translate(textX + (Math.random() - 0.5) * slamShake, canvas.height * 0.18 + (Math.random() - 0.5) * slamShake);
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#180207';
    ctx.lineWidth = 5;
    ctx.fillStyle = '#fff3f8';
    ctx.font = 'bold 64px Impact, Haettenschweiler, "Arial Black", sans-serif';
    ctx.strokeText('BOSS DEFEATED', 0, 0);
    ctx.fillText('BOSS DEFEATED', 0, 0);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = clamp((elapsed - 250) / 35, 0, 1);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 24px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`+${500 * bossNumber} BONUS`, canvas.width / 2, canvas.height * 0.26);
    ctx.restore();
}

function drawBossHud() {
    return;
}

function drawExplosionBlast(explosion) {
    if (!explosion) return;

    const progress = 1 - (explosion.life / explosion.maxLife);
    const radius = explosion.radius;
    const alpha = Math.pow(1 - progress, 1.5);

    ctx.save();
    ctx.translate(explosion.x, explosion.y);

    for (const smokeBlob of explosion.smokeBlobs) {
        const smokeDistance = smokeBlob.dist * radius * (1 + progress * 0.5);
        const smokeX = Math.cos(smokeBlob.angle) * smokeDistance;
        const smokeY = Math.sin(smokeBlob.angle) * smokeDistance;
        const smokeSize = smokeBlob.size * radius * (0.8 + progress * 0.4);
        ctx.fillStyle = `rgba(${explosion.smokeRgb}, ${alpha * 0.5})`;
        ctx.beginPath();
        ctx.arc(smokeX, smokeY, smokeSize, 0, Math.PI * 2);
        ctx.fill();
    }

    for (const blob of explosion.blobs) {
        const blobDistance = blob.dist * radius * (0.35 + progress * 0.9);
        const blobX = Math.cos(blob.angle) * blobDistance;
        const blobY = Math.sin(blob.angle) * blobDistance;
        const blobSize = blob.size * radius * (0.42 + progress * 0.2);
        const blobGrad = ctx.createRadialGradient(blobX, blobY, blobSize * 0.08, blobX, blobY, blobSize);
        const color = explosion.firePalette[blob.colorIdx];
        blobGrad.addColorStop(0, `rgba(255, 255, 220, ${alpha})`);
        blobGrad.addColorStop(0.28, `rgba(255, 230, 120, ${alpha * 0.95})`);

        if (color === '#ffdd00') {
            blobGrad.addColorStop(0.6, `rgba(255, 221, 0, ${alpha * 0.9})`);
            blobGrad.addColorStop(1, 'rgba(255, 221, 0, 0)');
        } else if (color === '#ff8800') {
            blobGrad.addColorStop(0.58, `rgba(255, 136, 0, ${alpha * 0.88})`);
            blobGrad.addColorStop(1, 'rgba(255, 136, 0, 0)');
        } else if (color === '#ff3300') {
            blobGrad.addColorStop(0.55, `rgba(255, 51, 0, ${alpha * 0.82})`);
            blobGrad.addColorStop(1, 'rgba(255, 51, 0, 0)');
        } else if (color === '#d9ff8a') {
            blobGrad.addColorStop(0.6, `rgba(217, 255, 138, ${alpha * 0.9})`);
            blobGrad.addColorStop(1, 'rgba(217, 255, 138, 0)');
        } else if (color === '#44ff44') {
            blobGrad.addColorStop(0.58, `rgba(68, 255, 68, ${alpha * 0.88})`);
            blobGrad.addColorStop(1, 'rgba(68, 255, 68, 0)');
        } else if (color === '#ffd58a') {
            blobGrad.addColorStop(0.6, `rgba(255, 213, 138, ${alpha * 0.92})`);
            blobGrad.addColorStop(1, 'rgba(255, 213, 138, 0)');
        } else if (color === '#ff5533') {
            blobGrad.addColorStop(0.58, `rgba(255, 85, 51, ${alpha * 0.88})`);
            blobGrad.addColorStop(1, 'rgba(255, 85, 51, 0)');
        } else if (color === '#ff2222') {
            blobGrad.addColorStop(0.55, `rgba(255, 34, 34, ${alpha * 0.84})`);
            blobGrad.addColorStop(1, 'rgba(255, 34, 34, 0)');
        } else {
            blobGrad.addColorStop(0.55, `rgba(204, 68, 255, ${alpha * 0.82})`);
            blobGrad.addColorStop(1, 'rgba(204, 68, 255, 0)');
        }

        ctx.fillStyle = blobGrad;
        ctx.beginPath();
        ctx.arc(blobX, blobY, blobSize, 0, Math.PI * 2);
        ctx.fill();
    }

    if (progress < 0.3) {
        const coreAlpha = 1 - progress / 0.3;
        const coreRadius = (1 - progress) * radius * 0.4;
        const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, coreRadius);
        coreGrad.addColorStop(0, `rgba(255, 255, 255, ${coreAlpha})`);
        coreGrad.addColorStop(0.45, `rgba(255, 245, 180, ${coreAlpha * 0.95})`);
        coreGrad.addColorStop(1, `rgba(${explosion.coreOuterRgb}, 0)`);
        ctx.fillStyle = coreGrad;
        ctx.beginPath();
        ctx.arc(0, 0, coreRadius, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

function drawTitleScreen() {
    const time = frameCount * 0.016;
    const portraitSize = Math.min(canvas.height * 0.78, canvas.width * 0.46);
    const portraitScale = 1 + Math.sin(time * 1.0) * 0.025;
    const portraitCenterX = canvas.width * 0.75;
    const portraitCenterY = canvas.height * 0.5;
    const portraitX = portraitCenterX - portraitSize / 2;
    const portraitY = portraitCenterY - portraitSize / 2;
    const maskedPortrait = ensureTitlePortraitCache(portraitSize, portraitSize);
    const nebulaDriftX = Math.sin(time * 0.4) * 14;
    const nebulaDriftY = Math.cos(time * 0.3) * 12;

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const nebulaLeft = ctx.createRadialGradient(
        canvas.width * 0.26,
        canvas.height * 0.44,
        0,
        canvas.width * 0.26,
        canvas.height * 0.44,
        canvas.height * 0.48
    );
    nebulaLeft.addColorStop(0, 'rgba(130, 90, 255, 0.3)');
    nebulaLeft.addColorStop(0.45, 'rgba(80, 30, 180, 0.14)');
    nebulaLeft.addColorStop(1, 'rgba(20, 10, 60, 0)');
    ctx.fillStyle = nebulaLeft;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const nebulaRight = ctx.createRadialGradient(
        portraitCenterX + nebulaDriftX,
        portraitCenterY + nebulaDriftY,
        0,
        portraitCenterX + nebulaDriftX,
        portraitCenterY + nebulaDriftY,
        portraitSize * 0.92
    );
    nebulaRight.addColorStop(0, 'rgba(90, 210, 255, 0.4)');
    nebulaRight.addColorStop(0.42, 'rgba(50, 120, 220, 0.2)');
    nebulaRight.addColorStop(0.72, 'rgba(120, 60, 220, 0.14)');
    nebulaRight.addColorStop(1, 'rgba(8, 20, 40, 0)');
    ctx.fillStyle = nebulaRight;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    const backlight = ctx.createRadialGradient(
        portraitCenterX,
        portraitCenterY,
        portraitSize * 0.1,
        portraitCenterX,
        portraitCenterY,
        portraitSize * 0.74
    );
    backlight.addColorStop(0, 'rgba(180, 245, 255, 0.46)');
    backlight.addColorStop(0.32, 'rgba(90, 170, 255, 0.28)');
    backlight.addColorStop(0.68, 'rgba(110, 65, 220, 0.14)');
    backlight.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = backlight;
    ctx.beginPath();
    ctx.arc(portraitCenterX, portraitCenterY, portraitSize * 0.78, 0, Math.PI * 2);
    ctx.fill();

    for (const star of titleStars) {
        let twinkle;
        if (star.mode === 'flash') {
            // Dramatic flash: mostly dim, occasionally flares bright
            const cycle = ((time + star.phase) % star.flashInterval) / star.flashInterval;
            const flash = cycle < 0.12 ? Math.pow(Math.sin(cycle / 0.12 * Math.PI), 2) : 0;
            twinkle = star.alpha * (0.15 + flash * 0.85);
        } else if (star.mode === 'sparkle') {
            // Rapid flicker — staccato twinkle
            const flicker = Math.sin(time * star.speed * 3 + star.phase) * Math.sin(time * star.speed * 1.7 + star.phase * 2);
            twinkle = star.alpha * (0.2 + (flicker + 1) * 0.4);
        } else {
            // Gentle pulse (original behavior)
            twinkle = star.alpha * (0.3 + (Math.sin(time * star.speed + star.phase) + 1) * 0.35);
        }
        const armLength = star.size * (0.6 + twinkle * 1.2);
        ctx.strokeStyle = `rgba(${star.tint}, ${twinkle})`;
        ctx.lineWidth = star.size > 5 ? 1.8 : 1.2;
        ctx.beginPath();
        ctx.moveTo(star.x - armLength, star.y);
        ctx.lineTo(star.x + armLength, star.y);
        ctx.moveTo(star.x, star.y - armLength);
        ctx.lineTo(star.x, star.y + armLength);
        ctx.stroke();
        // Bright core glow on flash
        const coreAlpha = Math.min(1, twinkle * 1.2 + 0.05);
        const coreR = star.coreSize * (1 + twinkle * 0.5);
        ctx.fillStyle = `rgba(255, 255, 255, ${coreAlpha})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, coreR, 0, Math.PI * 2);
        ctx.fill();
    }

    if (maskedPortrait) {
        const portraitGlow = ensurePortraitGlowCache(maskedPortrait, portraitSize);
        if (portraitGlow) {
            ctx.save();
            ctx.translate(portraitCenterX, portraitCenterY);
            ctx.scale(portraitScale, portraitScale);
            ctx.drawImage(
                portraitGlow,
                -portraitSize / 2 - TITLE_PORTRAIT_GLOW_PADDING,
                -portraitSize / 2 - TITLE_PORTRAIT_GLOW_PADDING
            );
            ctx.restore();
        }
    }

    const titleFloat = Math.sin(time * 2.0) * 8;
    const mainTitleSize = Math.max(78, canvas.width * 0.12);
    const subTitleSize = Math.max(50, mainTitleSize * 0.54);
    const kickerSize = Math.max(18, canvas.width * 0.017);
    const titleX = canvas.width * 0.25;
    const titleY = canvas.height * 0.38 + titleFloat;
    const kickerY = titleY + mainTitleSize * 0.72;
    const promptY = Math.min(canvas.height * 0.76, kickerY + subTitleSize * 1.1);
    const promptAlpha = 0.4 + (Math.sin(time * 4.2) + 1) * 0.3;

    const titleAreaWidth = Math.min(canvas.width * 0.44, portraitX - canvas.width * 0.06);
    const titleAreaHeight = mainTitleSize * 1.95;
    const titleAreaX = titleX - titleAreaWidth / 2;
    const titleAreaY = titleY - mainTitleSize * 1.02;
    const titleTextCanvas = renderTitleTextCanvas(titleAreaWidth, titleAreaHeight, mainTitleSize, subTitleSize, kickerSize, time);
    drawPixelCanvas(titleTextCanvas, titleAreaX, titleAreaY, titleAreaWidth, titleAreaHeight, 'rgba(110, 225, 255, 0.85)', 24, 0.72);

    const promptSize = Math.max(24, canvas.width * 0.028);
    const hintSize = Math.max(15, canvas.width * 0.015);
    const promptAreaWidth = titleAreaWidth * 1.04;
    const promptAreaHeight = Math.max(promptSize * 2.1, canvas.height * 0.12);
    const promptAreaX = titleX - promptAreaWidth / 2;
    const promptAreaY = promptY - promptSize * 0.72;
    const promptCanvas = renderTitlePromptCanvas(promptAreaWidth, promptAreaHeight, promptSize, hintSize, time);
    drawPixelCanvas(promptCanvas, promptAreaX, promptAreaY, promptAreaWidth, promptAreaHeight, `rgba(110, 225, 255, ${Math.min(0.9, promptAlpha)})`, 20, promptAlpha);

    ctx.imageSmoothingEnabled = true;
}

// Draw
let frameCount = 0;
function draw() {
    frameCount++;
    const time = frameCount * 0.016;

    // Boss intro: re-render a cached overlay every other frame, then just blit it
    if (gameState === 'bossIntro') {
        const needsFreshBossIntroCache = !bossIntroFrameCache || bossIntroFrameCache.width !== canvas.width || bossIntroFrameCache.height !== canvas.height;
        if (needsFreshBossIntroCache) {
            bossIntroFrameCache = document.createElement('canvas');
            bossIntroFrameCache.width = canvas.width;
            bossIntroFrameCache.height = canvas.height;
        }

        if (needsFreshBossIntroCache || frameCount % 2 === 0) {
            const cacheCtx = bossIntroFrameCache.getContext('2d');
            cacheCtx.setTransform(1, 0, 0, 1, 0, 0);
            cacheCtx.globalAlpha = 1;
            cacheCtx.globalCompositeOperation = 'source-over';
            cacheCtx.fillStyle = '#000';
            cacheCtx.fillRect(0, 0, canvas.width, canvas.height);
            drawBossIntroOverlay(cacheCtx);
        }

        ctx.drawImage(bossIntroFrameCache, 0, 0);
        return;
    }

    if (gameState === 'title' && titleFrameCache && frameCount % 2 === 1) {
        ctx.drawImage(titleFrameCache, 0, 0);
        return;
    }

    if (bgCanvas) {
        ctx.drawImage(bgCanvas, 0, 0);
    } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    for (let i = 0; i < stars.length; i += 3) {
        const s = stars[i];
        const twinkle = 0.5 + Math.sin(frameCount * s.twinkleSpeed + i) * 0.5;
        const alpha = s.brightness * twinkle * 0.5;
        const starX = gameState === 'title' ? s.x + Math.sin(time * 0.1 + i) * 2 : s.x;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(starX, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    }

    if (gameState === 'title') {
        drawTitleScreen();
        if (levelSelectActive) {
            const levelEntries = getLevelSelectEntries();
            const selectedEntry = levelEntries[levelSelectChoice];
            const visibleEntries = 7;
            const startIndex = Math.max(0, Math.min(levelEntries.length - visibleEntries, levelSelectChoice - Math.floor(visibleEntries / 2)));
            const endIndex = Math.min(levelEntries.length, startIndex + visibleEntries);

            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 46px Impact, Haettenschweiler, "Arial Black", sans-serif';
            ctx.fillStyle = '#ffe066';
            ctx.fillText('LEVEL SELECT', canvas.width / 2, canvas.height * 0.14);

            for (let i = startIndex; i < endIndex; i++) {
                const entry = levelEntries[i];
                const offset = i - levelSelectChoice;
                const y = canvas.height * 0.46 + offset * 54;
                const isSelected = i === levelSelectChoice;
                ctx.globalAlpha = isSelected ? 1 : 0.45;
                ctx.font = isSelected
                    ? 'bold 54px Impact, Haettenschweiler, "Arial Black", sans-serif'
                    : 'bold 34px Impact, Haettenschweiler, "Arial Black", sans-serif';
                ctx.fillStyle = entry.type === 'boss' ? '#ff8aab' : '#ffffff';
                if (isSelected) {
                    ctx.shadowColor = entry.type === 'boss' ? 'rgba(255, 90, 130, 0.9)' : 'rgba(255, 255, 255, 0.8)';
                    ctx.shadowBlur = 22;
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.fillText(entry.label, canvas.width / 2, y);
            }

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            ctx.fillStyle = selectedEntry && selectedEntry.type === 'boss' ? '#ffd4de' : '#9fd2ff';
            ctx.font = '22px "Courier New", monospace';
            ctx.fillText(selectedEntry ? selectedEntry.detail : '', canvas.width / 2, canvas.height * 0.73);
            ctx.fillStyle = '#aaa';
            ctx.font = '18px "Courier New", monospace';
            ctx.fillText('↑/↓ choose • ENTER start • B jumps to boss from level 3/6/9... • ESC cancel', canvas.width / 2, canvas.height * 0.81);
            ctx.restore();
        }
        if (!titleFrameCache || titleFrameCache.width !== canvas.width || titleFrameCache.height !== canvas.height) {
            titleFrameCache = document.createElement('canvas');
            titleFrameCache.width = canvas.width;
            titleFrameCache.height = canvas.height;
        }
        titleFrameCache.getContext('2d').drawImage(canvas, 0, 0);
        return;
    }

    const screenShakeActive = gameState !== 'bossIntro' && (screenShakeTimer > 0 || (shipExplosion && shipExplosion.life > 45));
    if (screenShakeActive) {
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
    }

    for (const p of particles) {
        const alpha = Math.min(1, p.life / 30);
        const size = p.size || 2;
        if (p.color && p.color !== '#fff') {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        } else {
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fillRect(p.x - 1, p.y - 1, size, size);
        }
    }

    drawPickups();
    drawAsteroidField(asteroids);
    drawEnemies();
    drawPulseWaves();

    for (const b of bullets) {
        ctx.save();
        ctx.shadowColor = '#ff3300';
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#ff3300';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    drawMissiles();
    drawLaserBeam();

    if (boss && (gameState === 'boss' || gameState === 'bossDefeated')) {
        drawBossEntity(boss, gameState === 'bossDefeated');
    }

    if (ship) {
        if (ship.invincible > 0 && Math.floor(ship.invincible / 6) % 2 === 0) {
        } else {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            if (ship.thrusting && Math.random() > 0.3) {
                ctx.shadowColor = '#ff6600';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.ellipse(-SHIP_IMG_WIDTH * 0.38 - Math.random() * 18, 0, 14 + Math.random() * 10, 7 + Math.random() * 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.ellipse(-SHIP_IMG_WIDTH * 0.38, 0, 9, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            const currentShipImg = ship.shootAnim > 0 ? shipShootingImg : shipImg;
            ctx.drawImage(currentShipImg, -SHIP_IMG_WIDTH / 2 + SHIP_IMG_OFFSET_X, -SHIP_IMG_HEIGHT / 2, SHIP_IMG_WIDTH, SHIP_IMG_HEIGHT);
            ctx.restore();

            if (ship.shield) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = 0.3 + Math.sin(frameCount * 0.08) * 0.1;
                ctx.strokeStyle = '#44aaff';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#44aaff';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.radius + 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }
    }

    if (ejectedPug) {
        const alpha = Math.min(1, ejectedPug.life / 40);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(ejectedPug.x, ejectedPug.y);
        ctx.rotate(ejectedPug.rotation);
        ctx.drawImage(pugEjectedImg, -PUG_EJECTED_WIDTH / 2, -PUG_EJECTED_HEIGHT / 2, PUG_EJECTED_WIDTH, PUG_EJECTED_HEIGHT);
        ctx.restore();
    }

    drawExplosionBlast(shipExplosion);
    for (const explosion of enemyExplosions) {
        drawExplosionBlast(explosion);
    }

    ctx.fillStyle = '#fff';
    ctx.font = '20px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${score}`, 20, 35);
    drawSpecialWeaponHud();
    drawBossHud();

    ctx.textAlign = 'right';
    ctx.fillText(`HIGH: ${highScore}`, canvas.width - 20, 35);

    for (let i = 0; i < lives; i++) {
        const lx = 30 + i * 35;
        const ly = 132;
        ctx.drawImage(shipImg, lx - 15, ly - 10, 30, 21);
    }

    ctx.textAlign = 'center';
    ctx.font = '14px monospace';
    ctx.fillText(`LEVEL ${level}`, canvas.width / 2, 25);

    if (levelTransitionActive) {
        const progress = 1 - (levelTransitionTimer / 150);
        const alpha = progress < 0.2 ? progress / 0.2 : progress > 0.8 ? (1 - progress) / 0.2 : 1;
        const transitionLabel = shouldTriggerBossFight(level) ? 'A CHALLENGER APPROACHES' : `LEVEL ${level + 1}`;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = 'bold 72px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = shouldTriggerBossFight(level) ? '#ff87b7' : '#ffe066';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.strokeText(transitionLabel, canvas.width / 2, canvas.height / 2);
        ctx.fillText(transitionLabel, canvas.width / 2, canvas.height / 2);
        ctx.restore();
    }

    if (gameState === 'bossIntro') {
        drawBossIntroOverlay();
    }

    if (gameState === 'bossDefeated') {
        drawBossDefeatedOverlay();
    }

    if (gameOver) {
        ctx.textAlign = 'center';
        ctx.font = '48px monospace';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '20px monospace';
        ctx.fillText('Press ENTER or SPACE to restart', canvas.width / 2, canvas.height / 2 + 30);
        ctx.font = '16px monospace';
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 70);
    }

    if (screenShakeActive) {
        ctx.restore();
    }
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    if (shieldFlashTimer > 0) {
        ctx.save();
        ctx.fillStyle = `rgba(255, 255, 255, ${shieldFlashTimer / 10})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
    }

    if (paused && ['playing', 'boss', 'bossIntro', 'bossDefeated'].includes(gameState)) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (doofPortrait.complete && doofPortrait.naturalWidth > 0) {
            const portraitSize = Math.min(canvas.height * 0.5, canvas.width * 0.35);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 - 20;
            const radius = portraitSize / 2;
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            ctx.globalAlpha = 0.3;
            const imgW = doofPortrait.naturalWidth;
            const imgH = doofPortrait.naturalHeight;
            const scale = Math.max(portraitSize / imgW, portraitSize / imgH) * 1.25;
            const drawW = imgW * scale;
            const drawH = imgH * scale;
            ctx.drawImage(doofPortrait, cx - drawW / 2, cy - drawH * 0.45, drawW, drawH);
            ctx.restore();
            ctx.save();
            ctx.globalAlpha = 0.5;
            ctx.strokeStyle = '#6ee6ff';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#6ee6ff';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 2, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
        ctx.font = 'bold 64px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffe066';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText('PAUSED', canvas.width / 2, canvas.height / 2);
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px "Courier New", monospace';
        ctx.fillStyle = '#ccc';
        ctx.fillText('Press P or ESC to resume', canvas.width / 2, canvas.height / 2 + 50);
        ctx.restore();
    }
}

// Game loop
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
