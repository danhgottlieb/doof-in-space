<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adventures in Space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden; background: #000;
            touch-action: none; -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none;
            overscroll-behavior: none;
        }
        canvas { display: block; touch-action: none; }

        /* ---- Rotate-to-landscape gate (mobile portrait) ---- */
        #rotateNotice {
            display: none;
            position: fixed; inset: 0; z-index: 50;
            background: radial-gradient(circle at 50% 38%, #0b1a3a 0%, #050912 70%, #02040a 100%);
            color: #d6f0ff; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 8vw;
            font-family: 'Trebuchet MS', system-ui, sans-serif;
        }
        #rotateNotice .rot-icon {
            font-size: 78px; line-height: 1;
            animation: rothint 1.8s ease-in-out infinite;
            filter: drop-shadow(0 0 16px rgba(90,190,255,0.8));
        }
        #rotateNotice h2 {
            margin-top: 26px; font-size: 26px; letter-spacing: 2px;
            color: #8fd6ff; text-shadow: 0 0 14px rgba(90,190,255,0.7);
        }
        #rotateNotice p { margin-top: 12px; font-size: 16px; opacity: 0.75; letter-spacing: 1px; }
        @keyframes rothint {
            0%, 100% { transform: rotate(-32deg); }
            50% { transform: rotate(58deg); }
        }
        /* The overlay is driven entirely by JS (isPortraitBlocked → .show) so
           the phone-sized + portrait gate stays the single source of truth. */
        #rotateNotice.show { display: flex; }

        /* ---- Touch controls ---- */
        #touchUI {
            position: fixed; inset: 0; z-index: 10;
            pointer-events: none;
            font-family: 'Trebuchet MS', system-ui, sans-serif;
        }
        #touchUI .tbtn, #touchUI .tpill {
            display: none; /* shown per-state via JS */
            position: absolute;
            pointer-events: auto;
            touch-action: none;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
            align-items: center; justify-content: center;
            color: #d6f0ff; font-weight: bold;
            background: rgba(18,38,58,0.32);
            border: 2px solid rgba(120,200,255,0.55);
            box-shadow: 0 0 14px rgba(80,180,255,0.35), inset 0 0 12px rgba(40,120,200,0.25);
            transition: background 0.05s, box-shadow 0.05s, transform 0.05s;
        }
        #touchUI .tbtn.active, #touchUI .tpill.active {
            background: rgba(90,190,255,0.5);
            box-shadow: 0 0 22px rgba(140,225,255,0.95), inset 0 0 16px rgba(120,220,255,0.5);
            transform: scale(0.94);
        }
        #touchUI .tbtn { border-radius: 50%; }
        #touchUI .round { width: 78px; height: 78px; font-size: 32px; }
        #touchUI .big { width: 100px; height: 100px; font-size: 22px; letter-spacing: 1px; }
        #touchUI .small { width: 50px; height: 50px; font-size: 18px; letter-spacing: 2px; }
        /* gameplay layout */
        #btnLeft   { bottom: 30px; left: 24px; }
        #btnRight  { bottom: 30px; left: 116px; }
        #btnThrust { bottom: 132px; right: 32px; }
        #btnFire   { bottom: 30px; right: 32px; }
        #btnPause  { top: 16px; right: 16px; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="rotateNotice">
    <div class="rot-icon">&#128241;</div>
    <h2>ROTATE YOUR DEVICE</h2>
    <p>Adventures in Space plays best in landscape</p>
</div>
<div id="touchUI">
    <!-- gameplay -->
    <div id="btnLeft" class="tbtn round" aria-label="Rotate left">&#9664;</div>
    <div id="btnRight" class="tbtn round" aria-label="Rotate right">&#9654;</div>
    <div id="btnThrust" class="tbtn round" aria-label="Thrust">&#9650;</div>
    <div id="btnFire" class="tbtn big" aria-label="Fire">FIRE</div>
    <div id="btnPause" class="tbtn small" aria-label="Pause">&#10073;&#10073;</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Resize canvas to fill window
// Reference for the smaller screen edge. If the device's short edge is
// smaller than this, we render the game at a larger *virtual* resolution
// (CSS-scaled back down to fill the screen) so the playfield "zooms out"
// and the ship/asteroids occupy a desktop-like fraction of the view.
const REFERENCE_MIN_EDGE = 720;
const MAX_RENDER_SCALE = 2.4;
function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const minEdge = Math.min(w, h);
    // scale >= 1; only kicks in on small screens (phones).
    const scale = Math.min(MAX_RENDER_SCALE, Math.max(1, REFERENCE_MIN_EDGE / minEdge));
    // Backing store / logical coordinate space (what all game code uses).
    canvas.width = Math.round(w * scale);
    canvas.height = Math.round(h * scale);
    // Displayed size always fills the viewport; browser downscales the
    // larger backing store to fit, which is the zoom-out effect.
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

// ---- Block mobile pinch / double-tap zoom (iOS ignores user-scalable) ----
document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
let lastTouchEndTime = 0;
document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouchEndTime <= 320) e.preventDefault(); // kill double-tap zoom
    lastTouchEndTime = now;
}, { passive: false });
document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault(); // kill pinch zoom
}, { passive: false });

// Game constants
const TURN_SPEED = 0.07;
const THRUST = 0.1;
const FRICTION = 0.99;
const BULLET_SPEED = 8;
const BULLET_LIFE = 60;
const MAX_BULLETS = 8;
const SHOOT_COOLDOWN = 8;
const ASTEROID_SPEED = 1.5;
const ASTEROID_VERTICES = 10;
const ASTEROID_JAG = 0.4;
const STARTING_ASTEROIDS = 4;
const SHIP_SIZE = 69;
const SHIP_IMG_WIDTH = 175;
const SHIP_IMG_HEIGHT = 116;
const SHIP_IMG_OFFSET_X = -12; // shift image left so saucer body is centered
const GUN_TIP_X = 65; // forward distance to gun tip from ship center
const GUN_TIP_Y = 14;  // slight downward offset (barrel is just below center)
const SHIP_INVINCIBLE_TIME = 180;
const RESPAWN_DELAY = 120;
const PICKUP_MIN_SPAWN = 10 * 60;
const PICKUP_MAX_SPAWN = 22 * 60;
const PICKUP_LIFE = 8 * 60;
const PICKUP_RADIUS = 20;
const LASER_ENERGY_MAX = 30;
const LASER_TOTAL_AMMO = 180;
const PULSE_SHOTS = 5;
const HOMING_SHOTS = 5;
const PULSE_RADIUS = 200;
const PULSE_SPEED = 16;
const MISSILE_SPEED = 5.5;
const MISSILE_TURN_SPEED = 0.09;
const ENEMY_BULLET_SPEED = 4;
const RED_ENEMY_BULLET_SPEED = 5;
const ENEMY_BULLET_LIFE = 90;
const ENEMY_COLLISION_RADIUS = 44;

// Load ship image
const shipImg = new Image();
const shipShootingImg = new Image();
shipImg.src = 'pug-ship.png';
shipShootingImg.src = 'pug-ship-shooting.png';
const doofPortrait = new Image();
doofPortrait.src = 'doof-portrait.png';
doofPortrait.onload = () => {
    titlePortraitCache = null;
    titlePortraitCacheWidth = 0;
    titlePortraitCacheHeight = 0;
    portraitGlowCache = null;
    portraitGlowCacheSize = 0;
};

// Load ejected pug image
const pugEjectedImg = new Image();
pugEjectedImg.src = 'pug-ejected.png';
const enemyShipImg = new Image();
enemyShipImg.src = 'enemy-ship.png';
const enemyShipRedImg = new Image();
enemyShipRedImg.src = 'enemy-ship-red.png';
const bossPortraitImg = new Image();
bossPortraitImg.src = 'boss-portrait.png';
const bossFrame1 = new Image();
bossFrame1.src = 'boss-frame-1.png';
const bossFrame2 = new Image();
bossFrame2.src = 'boss-frame-2.png';
const bossFrame3 = new Image();
bossFrame3.src = 'boss-frame-3.png';
const bossAngryImg = new Image();
bossAngryImg.src = 'boss-angry.png';
const bossDefeatedImg = new Image();
bossDefeatedImg.src = 'boss-defeated.png';

// ---- Characters (Doof + Devyn) ----
const devynShipImg = new Image();
devynShipImg.src = 'devyn-ship.png';
const devynShipShootingImg = new Image();
devynShipShootingImg.src = 'devyn-ship-shooting.png';
const devynEjectedImg = new Image();
devynEjectedImg.src = 'devyn-ejected.png';
const devynPortrait = new Image();
devynPortrait.src = 'devyn-portrait.png';
devynPortrait.onload = () => {
    titlePortraitCache = null;
    titlePortraitCacheWidth = 0;
    titlePortraitCacheHeight = 0;
    portraitGlowCache = null;
    portraitGlowCacheSize = 0;
};

const CHARACTER_ORDER = ['doof', 'devyn'];
const CHARACTERS = {
    doof: {
        name: 'Doof', titleWord: 'DOOF', label: 'DOOF IN SPACE',
        ship: shipImg, shipShooting: shipShootingImg, ejected: pugEjectedImg, portrait: doofPortrait,
        ejectedScale: 1,
        pausePortraitAnchor: 0.45,
        pauseLabel: 'PAWS', pauseHint: 'Press P or ESC to unpaws', hintPause: 'P paws'
    },
    devyn: {
        name: 'Devyn', titleWord: 'DEVYN', label: 'DEVYN IN SPACE',
        ship: devynShipImg, shipShooting: devynShipShootingImg, ejected: devynEjectedImg, portrait: devynPortrait,
        ejectedScale: 0.62,
        pausePortraitAnchor: 0.30,
        pauseLabel: 'PAUSE', pauseHint: 'Press P or ESC to unpause', hintPause: 'P pause'
    }
};
let selectedCharacter = 'doof';
let characterSelectChoice = 0;
function activeChar() { return CHARACTERS[selectedCharacter]; }
function activePortrait() { return CHARACTERS[selectedCharacter].portrait; }
function applyCharacterSelection() {
    selectedCharacter = CHARACTER_ORDER[characterSelectChoice] || 'doof';
    titlePortraitCache = null;
    titlePortraitCacheWidth = 0;
    titlePortraitCacheHeight = 0;
    portraitGlowCache = null;
    portraitGlowCacheSize = 0;
    titleTextSurface = null;
    titleTextSurfaceTick = -1;
    titleFrameCache = null;
}
const ENEMY_WIDTH = 150;
const ENEMY_HEIGHT = 100;
const RED_ENEMY_WIDTH = 160;
const RED_ENEMY_HEIGHT = 107;
const RED_ENEMY_COLLISION_RADIUS = 48;
const PUG_EJECTED_WIDTH = 188;  // sized so pug body matches the pug in the ship (1.5:1 ratio)
const PUG_EJECTED_HEIGHT = 125;
const PUG_FLOAT_DURATION = 180; // 3 seconds at 60fps

// Background stars (generated once)
let stars = [];
let bgCanvas = null;
let titleAsteroids = [];
let titlePortraitCache = null;
let titlePortraitCacheWidth = 0;
let titlePortraitCacheHeight = 0;
let portraitGlowCache = null;
let portraitGlowCacheSize = 0;
const TITLE_PORTRAIT_GLOW_PADDING = 60;
let titleFrameCache = null;
let titleTextSurface = null;
let titleTextSurfaceTick = -1;
let titlePromptSurface = null;
let titlePromptSurfaceTick = -1;
let titleStars = [];
let bossIntroFrameCache = null;

function generateBackground() {
    bgCanvas = document.createElement('canvas');
    bgCanvas.width = canvas.width;
    bgCanvas.height = canvas.height;
    const bgCtx = bgCanvas.getContext('2d');

    // Deep space gradient
    const grad = bgCtx.createRadialGradient(
        canvas.width * 0.3, canvas.height * 0.4, 0,
        canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.8
    );
    grad.addColorStop(0, '#1a0a2e');
    grad.addColorStop(0.4, '#0d0221');
    grad.addColorStop(0.7, '#0a0118');
    grad.addColorStop(1, '#000005');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle nebula clouds
    for (let i = 0; i < 3; i++) {
        const nx = Math.random() * canvas.width;
        const ny = Math.random() * canvas.height;
        const nr = 150 + Math.random() * 250;
        const nebula = bgCtx.createRadialGradient(nx, ny, 0, nx, ny, nr);
        const hue = 260 + Math.random() * 40; // purples
        nebula.addColorStop(0, `hsla(${hue}, 60%, 20%, 0.12)`);
        nebula.addColorStop(0.5, `hsla(${hue}, 50%, 15%, 0.06)`);
        nebula.addColorStop(1, 'transparent');
        bgCtx.fillStyle = nebula;
        bgCtx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Stars — mix of sizes and brightness
    stars = [];
    const starCount = Math.floor((canvas.width * canvas.height) / 3000);
    for (let i = 0; i < starCount; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const size = Math.random() < 0.9 ? 0.5 + Math.random() * 0.8 : 1.5 + Math.random();
        const brightness = 0.3 + Math.random() * 0.7;
        stars.push({ x, y, size, brightness, twinkleSpeed: 0.02 + Math.random() * 0.03 });
        // Draw static base star
        bgCtx.fillStyle = `rgba(255,255,255,${brightness * 0.6})`;
        bgCtx.beginPath();
        bgCtx.arc(x, y, size * 0.6, 0, Math.PI * 2);
        bgCtx.fill();
    }
}

// Game state (must be before resize() which calls generateTitleAsteroids → getAsteroidSpeed)
let gameState = 'characterSelect';
let difficulty = 'hard';
const DIFFICULTY_OPTIONS = [
    { label: 'EASY', value: 'easy' },
    { label: 'HARD', value: 'hard' }
];

// Regenerate background on resize
const originalResize = resize;
window.removeEventListener('resize', originalResize);
resize = function() {
    originalResize();
    generateBackground();
    generateTitleAsteroids();
    generateTitleStars();
    titlePortraitCache = null;
    titlePortraitCacheWidth = 0;
    titlePortraitCacheHeight = 0;
    portraitGlowCache = null;
    portraitGlowCacheSize = 0;
    titleFrameCache = null;
    titleTextSurface = null;
    titleTextSurfaceTick = -1;
    titlePromptSurface = null;
    titlePromptSurfaceTick = -1;
    bossIntroFrameCache = null;
};
window.addEventListener('resize', resize);
resize();
let ship = null, asteroids = [], bullets = [], particles = [], pickups = [], pulseWaves = [], missiles = [], enemies = [], enemyBullets = [], enemyExplosions = [], score = 0, lives = 0, level = 1, gameOver = false;
let highScore = parseInt(localStorage.getItem('asteroids_high') || '0');
let respawnTimer = 0;
let pickupSpawnTimer = 0;
let levelTransitionTimer = 0;
let levelTransitionActive = false;
let laserBeam = null;
let prevFirePressed = false;
let ejectedPug = null; // floating pug revealed as the ship explosion fades
let shipExplosion = null; // big cartoon explosion layered over the ejected pug
let screenShakeTimer = 0;
let shieldFlashTimer = 0;
let hpFlashTimer = 0;
let gameOverTimer = 0;
let enemiesRemaining = 0;
let enemySpawnTimer = 0;
let redEnemiesRemaining = 0;
let redEnemySpawnTimer = 0;
let boss = null;
let bossIntroTimer = 0;
let bossDefeatedTimer = 0;
let bossNumber = 0;
let bossAsteroidSpawnTimer = 0;

// Konami code: Up Up Down Down Left Right Left Right B A
const KONAMI_CODE = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyB','KeyA'];
let konamiProgress = 0;
let levelSelectActive = false;
const LEVEL_SELECT_MAX_LEVEL = 20;
let levelSelectChoice = 0;
let difficultySelectChoice = 1;

function getLevelSelectEntries() {
    const entries = [];
    for (let levelNumber = 1; levelNumber <= LEVEL_SELECT_MAX_LEVEL; levelNumber++) {
        entries.push({
            type: 'level',
            level: levelNumber,
            bossNumber: Math.max(1, Math.floor(levelNumber / 3)),
            label: `LEVEL ${levelNumber}`,
            detail: levelNumber % 3 === 0 ? `Clears into BOSS ${Math.floor(levelNumber / 3)}` : 'Regular wave'
        });
        if (levelNumber % 3 === 0) {
            const unlockedBoss = Math.floor(levelNumber / 3);
            entries.push({
                type: 'boss',
                level: levelNumber,
                bossNumber: unlockedBoss,
                label: `BOSS ${unlockedBoss}`,
                detail: 'Jump straight to the intro'
            });
        }
    }
    return entries;
}

function launchLevelSelectEntry(entry) {
    if (!entry) return;

    levelSelectActive = false;
    keys['Space'] = false;
    keys['Enter'] = false;
    titleFrameCache = null;
    initGame();
    level = entry.level;
    asteroids = spawnAsteroids(STARTING_ASTEROIDS + level - 1);
    resetEnemyWaveForLevel(level);

    if (entry.type === 'boss') {
        startBossIntro();
    }
}

function startDifficultySelect() {
    difficultySelectChoice = difficulty === 'easy' ? 0 : 1;
    gameState = 'difficultySelect';
    keys['Space'] = false;
    keys['Enter'] = false;
    titleFrameCache = null;
}

function confirmDifficultySelection() {
    const selected = DIFFICULTY_OPTIONS[difficultySelectChoice] || DIFFICULTY_OPTIONS[1];
    difficulty = selected.value;
    keys['Space'] = false;
    keys['Enter'] = false;
    titleFrameCache = null;
    if (canvas) canvas.style.cursor = 'default';
    initGame();
}

// Input
const keys = {};
let paused = false;

// Game over → character select (auto after timer, or on key/tap).
function returnToCharacterSelectAfterGameOver() {
    gameOver = false;
    gameOverTimer = 0;
    ejectedPug = null;
    shipExplosion = null;
    laserBeam = null;
    gameState = 'characterSelect';
    titleFrameCache = null;
    switchMusic(titleMusic);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space', 'ArrowUp', 'ArrowDown', 'Enter'].includes(e.code)) e.preventDefault();
    // Start title music on first interaction (retry if browser blocked it)
    if (gameState === 'characterSelect' || gameState === 'title' || gameState === 'difficultySelect') {
        if (!currentMusic) {
            switchMusic(titleMusic);
        } else if (currentMusic === titleMusic && titleMusic.paused) {
            titleMusic.play().catch(() => {});
        }
    }
    // Konami code detection on title screen
    if (gameState === 'title' && !levelSelectActive) {
        if (e.code === KONAMI_CODE[konamiProgress]) {
            konamiProgress++;
            if (konamiProgress >= KONAMI_CODE.length) {
                levelSelectActive = true;
                levelSelectChoice = 0;
                konamiProgress = 0;
                playPickupSound();
            }
        } else {
            konamiProgress = (e.code === KONAMI_CODE[0]) ? 1 : 0;
        }
    }
    // Level select controls
    if (gameState === 'title' && levelSelectActive) {
        const levelEntries = getLevelSelectEntries();
        const selectedEntry = levelEntries[levelSelectChoice];
        if (e.code === 'ArrowUp') levelSelectChoice = Math.max(0, levelSelectChoice - 1);
        if (e.code === 'ArrowDown') levelSelectChoice = Math.min(levelEntries.length - 1, levelSelectChoice + 1);
        if (e.code === 'Enter' || e.code === 'Space') {
            launchLevelSelectEntry(selectedEntry);
        }
        if (e.code === 'KeyB' && selectedEntry && selectedEntry.type === 'level' && selectedEntry.level % 3 === 0) {
            launchLevelSelectEntry({
                type: 'boss',
                level: selectedEntry.level,
                bossNumber: Math.floor(selectedEntry.level / 3)
            });
        }
        if (e.code === 'Escape') levelSelectActive = false;
    }
    if (gameState === 'characterSelect') {
        if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
            const target = e.code === 'ArrowLeft' ? 0 : 1;
            if (target !== characterSelectChoice) {
                characterSelectChoice = target;
                playPickupSound();
                titleFrameCache = null;
            }
            e.preventDefault();
        } else if (e.code === 'Enter' || e.code === 'Space') {
            applyCharacterSelection();
            gameState = 'title';
            keys['Space'] = false;
            keys['Enter'] = false;
            titleFrameCache = null;
        }
    } else if (gameState === 'title' && !levelSelectActive && (e.code === 'Enter' || e.code === 'Space')) {
        startDifficultySelect();
    } else if (gameState === 'title' && !levelSelectActive && e.code === 'Escape') {
        gameState = 'characterSelect';
        keys['Space'] = false;
        keys['Enter'] = false;
        titleFrameCache = null;
    } else if (gameState === 'difficultySelect') {
        if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
            difficultySelectChoice = difficultySelectChoice === 0 ? 1 : 0;
        }
        if (e.code === 'Enter' || e.code === 'Space') {
            confirmDifficultySelection();
        }
        if (e.code === 'Escape') {
            gameState = 'title';
            keys['Space'] = false;
            keys['Enter'] = false;
            titleFrameCache = null;
        }
    }
    // Game over: any of Enter/Space/Escape returns to character select immediately
    if ((gameState === 'gameover' || gameOver) && ['Enter', 'Space', 'Escape'].includes(e.code)) {
        returnToCharacterSelectAfterGameOver();
        keys['Space'] = false;
        keys['Enter'] = false;
    }
    // Pause toggle
    if ((e.code === 'KeyP' || e.code === 'Escape') && ['playing', 'boss', 'bossIntro', 'bossDefeated'].includes(gameState)) {
        paused = !paused;
        if (paused) {
            if (currentMusic) currentMusic.pause();
            stopThruster();
            stopLaserHum();
        } else {
            if (currentMusic) currentMusic.play().catch(() => {});
        }
    }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('click', () => {
    if ((gameState === 'characterSelect' || gameState === 'title' || gameState === 'difficultySelect') && !currentMusic) switchMusic(titleMusic);
    if (currentMusic && currentMusic.paused) currentMusic.play().catch(() => {});
}, { once: true });
// Also try on pointerdown and mousedown for faster music start
window.addEventListener('pointerdown', () => {
    if ((gameState === 'characterSelect' || gameState === 'title' || gameState === 'difficultySelect') && !currentMusic) switchMusic(titleMusic);
    if (currentMusic && currentMusic.paused) currentMusic.play().catch(() => {});
}, { once: true });

let audioContext = null;
let laserHum = null;
let thrusterSound = null;

// Ship
function createShip(invincible = false) {
    return {
        x: canvas.width / 2,
        y: canvas.height / 2,
        angle: -Math.PI / 2,
        dx: 0,
        dy: 0,
        thrusting: false,
        invincible: invincible ? SHIP_INVINCIBLE_TIME : 0,
        shootCooldown: 0,
        shootAnim: 0,
        hitPoints: difficulty === 'easy' ? 2 : 1,
        hitFlash: 0,
        radius: SHIP_SIZE,
        shield: false,
        specialWeapon: { type: null, ammo: 0, energy: 0 }
    };
}

function getAsteroidSpeed() {
    return difficulty === 'easy' ? ASTEROID_SPEED * 0.75 : ASTEROID_SPEED;
}

// Asteroids
function createAsteroid(x, y, size) {
    const angle = Math.random() * Math.PI * 2;
    const speed = getAsteroidSpeed() * (3 / size) * (0.5 + Math.random() * 0.5);
    const vertices = [];
    for (let i = 0; i < ASTEROID_VERTICES; i++) {
        vertices.push(1 + Math.random() * ASTEROID_JAG * 2 - ASTEROID_JAG);
    }
    return {
        x, y,
        dx: Math.cos(angle) * speed,
        dy: Math.sin(angle) * speed,
        size, // 3=large, 2=medium, 1=small
        radius: size * 20,
        angle: 0,
        rotSpeed: (Math.random() - 0.5) * 0.03,
        vertices
    };
}

function spawnAsteroids(count) {
    const arr = [];
    const spawnCount = difficulty === 'easy' ? Math.max(2, Math.floor(count * 0.7)) : count;
    for (let i = 0; i < spawnCount; i++) {
        let x, y;
        do {
            x = Math.random() * canvas.width;
            y = Math.random() * canvas.height;
        } while (ship && dist(x, y, ship.x, ship.y) < 150);
        arr.push(createAsteroid(x, y, 3));
    }
    return arr;
}

function getEnemyCountForLevel(currentLevel) {
    let green = 0;
    let red = 0;

    if (currentLevel >= 2) {
        green = currentLevel === 2 ? 1 : currentLevel === 3 ? 1 + Math.floor(Math.random() * 2) : 2 + Math.floor(Math.random() * 2);
    }

    if (currentLevel === 3) red = 1;
    else if (currentLevel === 4) red = 1 + Math.floor(Math.random() * 2);
    else if (currentLevel >= 5) red = 2 + Math.floor(Math.random() * 2);

    return { green, red };
}

function resetEnemyWaveForLevel(currentLevel) {
    const counts = getEnemyCountForLevel(currentLevel);
    enemiesRemaining = counts.green;
    redEnemiesRemaining = counts.red;
    enemySpawnTimer = enemiesRemaining > 0 ? 120 + Math.floor(Math.random() * 180) : 0;
    redEnemySpawnTimer = redEnemiesRemaining > 0 ? 100 + Math.floor(Math.random() * 140) : 0;
}

function resetBossState() {
    boss = null;
    bossIntroTimer = 0;
    bossDefeatedTimer = 0;
    bossAsteroidSpawnTimer = 0;
    bossIntroFrameCache = null;
}

function shouldTriggerBossFight(currentLevel) {
    return currentLevel > 0 && currentLevel % 3 === 0;
}

function getBossPhaseHp(bossNum) {
    if (bossNum === 1) return 25;
    if (bossNum === 2) return 35;
    return 45 + (bossNum - 3) * 5;
}

function getBossPhaseSpeedMultiplier(phase) {
    return phase === 1 ? 1 : phase === 2 ? 1.24 : 1.5;
}

function getBossPhaseSteeringMultiplier(phase) {
    return phase === 1 ? 1 : phase === 2 ? 1.28 : 1.58;
}

function getBossAngerTarget(radius) {
    const paddingX = radius + 34;
    const paddingY = radius + 34;
    return {
        x: paddingX + Math.random() * Math.max(40, canvas.width - paddingX * 2),
        y: paddingY + Math.random() * Math.max(40, canvas.height - paddingY * 2)
    };
}

function scheduleNextBossAsteroid() {
    const phaseBonus = boss ? (boss.phase - 1) * 26 + (boss.isAngry ? 12 : 0) : 0;
    const minDelay = Math.max(48, 170 - bossNumber * 16 - phaseBonus);
    const maxDelay = Math.max(minDelay + 28, 255 - bossNumber * 18 - phaseBonus);
    bossAsteroidSpawnTimer = minDelay + Math.floor(Math.random() * (maxDelay - minDelay + 1));
}

function spawnBossAsteroid() {
    const margin = 80;
    const side = Math.floor(Math.random() * 4);
    let x = side === 0 ? margin : side === 1 ? canvas.width - margin : Math.random() * canvas.width;
    let y = side === 2 ? margin : side === 3 ? canvas.height - margin : Math.random() * canvas.height;

    if (ship && dist(x, y, ship.x, ship.y) < 220) {
        x = (x + canvas.width * 0.5) % canvas.width;
        y = (y + canvas.height * 0.5) % canvas.height;
    }
    if (boss && dist(x, y, boss.x, boss.y) < boss.radius + 150) {
        x = (x + canvas.width * 0.42) % canvas.width;
        y = (y + canvas.height * 0.38) % canvas.height;
    }

    const size = bossNumber >= 2 && Math.random() < 0.55 ? 3 : 2;
    const asteroid = createAsteroid(x, y, size);
    const angle = Math.atan2(canvas.height / 2 - y, canvas.width / 2 - x) + (Math.random() - 0.5) * 0.7;
    const speed = (1 + Math.random() * 0.9) * (1 + bossNumber * 0.08 + ((boss ? boss.phase : 1) - 1) * 0.12);
    asteroid.dx = Math.cos(angle) * speed;
    asteroid.dy = Math.sin(angle) * speed;
    asteroid.rotSpeed *= 0.9;
    asteroids.push(asteroid);
}

function createBoss(bossNum) {
    const phaseHp = getBossPhaseHp(bossNum);
    const width = 620 + (bossNum - 1) * 36;
    const height = width * (1065 / 1600);
    return {
        x: canvas.width + width * 0.58,
        y: canvas.height / 2,
        dx: 0,
        dy: 0,
        speed: 1.75 * (1 + (bossNum - 1) * 0.18),
        radius: 168 + (bossNum - 1) * 8,
        hp: phaseHp * 3,
        maxHp: phaseHp * 3,
        phase: 1,
        phaseHp,
        phaseMaxHp: phaseHp,
        width,
        height,
        frameIndex: 0,
        frameTimer: 0,
        wobblePhase: Math.random() * Math.PI * 2,
        pushBackVx: 0,
        pushBackVy: 0,
        damageFlash: 0,
        hitFlash: 0,
        hitSoundTimer: 0,
        entered: false,
        isAngry: false,
        angryTimer: 0,
        angerScale: 1,
        targetPos: null,
        invincible: false
    };
}

function emitBossInvincibleSparks(sourceX, sourceY, effectColor = '#ffd1ea') {
    if (!boss) return;
    const angle = Math.atan2(sourceY - boss.y, sourceX - boss.x);
    const hitX = boss.x + Math.cos(angle) * boss.radius * 0.9;
    const hitY = boss.y + Math.sin(angle) * boss.radius * 0.6;
    for (let i = 0; i < 10; i++) {
        const sparkAngle = angle + Math.PI + (Math.random() - 0.5) * 1.3;
        const speed = 1.5 + Math.random() * 4.2;
        particles.push({
            x: hitX,
            y: hitY,
            dx: Math.cos(sparkAngle) * speed,
            dy: Math.sin(sparkAngle) * speed,
            life: 10 + Math.random() * 12,
            color: i % 2 === 0 ? '#ffffff' : effectColor,
            size: 2 + Math.random() * 3.5
        });
    }
    screenShakeTimer = Math.max(screenShakeTimer, 3);
}

function deflectBulletFromBoss(bullet) {
    if (!boss || !bullet) return;
    const angle = Math.atan2(bullet.y - boss.y, bullet.x - boss.x);
    const speed = Math.max(4, Math.hypot(bullet.dx, bullet.dy));
    bullet.dx = Math.cos(angle) * speed * 0.92;
    bullet.dy = Math.sin(angle) * speed * 0.92;
    bullet.x = boss.x + Math.cos(angle) * (boss.radius + 10);
    bullet.y = boss.y + Math.sin(angle) * (boss.radius + 10);
    bullet.life = Math.max(0, bullet.life - 10);
    emitBossInvincibleSparks(bullet.x, bullet.y);
}

function startBossIntro() {
    bossNumber = Math.max(1, Math.floor(level / 3));
    resetBossState();
    gameState = 'bossIntro';
    bossIntroTimer = 210;
    bossIntroFrameCache = null;
    asteroids = [];
    bullets = [];
    particles = [];
    pickups = [];
    pulseWaves = [];
    missiles = [];
    enemies = [];
    enemyBullets = [];
    enemyExplosions = [];
    enemiesRemaining = 0;
    redEnemiesRemaining = 0;
    laserBeam = null;
    levelTransitionActive = false;
    stopLaserHum();
    stopThruster();
    // Keep game music playing during boss intro (don't stop it)
    if (!currentMusic || currentMusic.paused) {
        switchMusic(gameMusic);
    }
    playBossIntroSound();
}

function startBossFight() {
    gameState = 'boss';
    boss = createBoss(bossNumber);
    asteroids = [];
    bullets = [];
    pickups = [];
    pulseWaves = [];
    missiles = [];
    enemies = [];
    enemyBullets = [];
    enemyExplosions = [];
    enemiesRemaining = 0;
    redEnemiesRemaining = 0;
    laserBeam = null;

    const initialAsteroids = 2 + Math.min(1, bossNumber - 1);
    for (let i = 0; i < initialAsteroids; i++) {
        spawnBossAsteroid();
    }
    scheduleNextBossAsteroid();
    switchMusic(gameMusic);
}

function startBossAngerTransition() {
    if (!boss || boss.isAngry || boss.phase >= 3) return;

    boss.phaseHp = 0;
    boss.isAngry = true;
    boss.invincible = true;
    boss.angryTimer = 120;
    boss.angerScale = 1;
    boss.targetPos = getBossAngerTarget(boss.radius);
    boss.dx *= 0.35;
    boss.dy *= 0.35;
    boss.pushBackVx = 0;
    boss.pushBackVy = 0;
    boss.damageFlash = 18;
    boss.hitFlash = 10;
    screenShakeTimer = Math.max(screenShakeTimer, 24);
    playBossPhaseTransitionSound(boss.phase + 1);
    createExplosion(boss.x, boss.y, 18, '#ff4f78');
}

function finishBossAngerTransition() {
    if (!boss) return;
    boss.isAngry = false;
    boss.invincible = false;
    boss.phase = Math.min(3, boss.phase + 1);
    boss.phaseMaxHp = getBossPhaseHp(bossNumber);
    boss.phaseHp = boss.phaseMaxHp;
    boss.damageFlash = 12;
    boss.hitFlash = 7;
    boss.angerScale = 1;
    boss.targetPos = null;
    createExplosion(boss.x, boss.y, 14, '#ff93b4');
    scheduleNextBossAsteroid();
}

function startBossDefeated() {
    if (!boss || gameState === 'bossDefeated') return;

    boss.phaseHp = 0;
    boss.hp = 0;
    boss.dx = 0;
    boss.dy = 0;
    boss.pushBackVx = 0;
    boss.pushBackVy = 0;
    boss.damageFlash = 18;
    boss.hitFlash = 12;
    boss.invincible = true;
    boss.isAngry = false;
    boss.angerScale = 1;
    gameState = 'bossDefeated';
    bossDefeatedTimer = 330;
    asteroids = [];
    bullets = [];
    pulseWaves = [];
    missiles = [];
    enemies = [];
    enemyBullets = [];
    enemyExplosions = [];
    pickups = [];
    laserBeam = null;
    stopLaserHum();
    stopThruster();
    switchMusic(null);
    playBossDefeatGroan();
    addScore(500 * bossNumber);
    screenShakeTimer = Math.max(screenShakeTimer, 26);

    for (let i = 0; i < 60; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.6 + Math.random() * 5.4;
        particles.push({
            x: boss.x,
            y: boss.y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 28 + Math.random() * 48,
            color: Math.random() > 0.45 ? '#ff5f8f' : (Math.random() > 0.5 ? '#ffd5ea' : '#fff2f7'),
            size: 3 + Math.random() * 5
        });
    }
    createExplosion(boss.x, boss.y, 42, '#ff7ca7');
}

function damageBoss(amount, sourceX, sourceY, pushForce = 0, effectColor = '#ff8fc2', playImpact = true) {
    if (!boss || gameState !== 'boss') return false;
    if (boss.invincible) {
        emitBossInvincibleSparks(sourceX, sourceY, effectColor);
        return false;
    }

    const appliedDamage = Math.min(amount, boss.phaseHp);
    if (appliedDamage <= 0) return false;

    boss.hp = Math.max(0, boss.hp - appliedDamage);
    boss.phaseHp = Math.max(0, boss.phaseHp - appliedDamage);
    boss.damageFlash = 12;
    boss.hitFlash = 7;
    screenShakeTimer = Math.max(screenShakeTimer, 6);

    const pushAngle = Math.atan2(boss.y - sourceY, boss.x - sourceX);
    boss.pushBackVx += Math.cos(pushAngle) * pushForce;
    boss.pushBackVy += Math.sin(pushAngle) * pushForce;

    for (let i = 0; i < 12; i++) {
        const angle = pushAngle + (Math.random() - 0.5) * 1.1;
        const speed = 1.2 + Math.random() * 3.4;
        particles.push({
            x: boss.x + Math.cos(angle) * (boss.radius * 0.78),
            y: boss.y + Math.sin(angle) * (boss.radius * 0.48),
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 12 + Math.random() * 14,
            color: i % 3 === 0 ? '#ffffff' : effectColor,
            size: 2 + Math.random() * 3.4
        });
    }

    if (playImpact && boss.hitSoundTimer <= 0) {
        playBossHitSound();
        boss.hitSoundTimer = 3;
    }

    if (boss.phaseHp <= 0) {
        if (boss.phase < 3) {
            startBossAngerTransition();
        } else {
            startBossDefeated();
        }
    }

    return true;
}

function updateBoss() {
    if (!boss || gameState !== 'boss') return;

    const frameSequenceLength = 8;
    boss.frameTimer++;
    if (boss.frameTimer >= 8) {
        boss.frameTimer = 0;
        boss.frameIndex = (boss.frameIndex + 1) % frameSequenceLength;
    }
    if (boss.hitSoundTimer > 0) boss.hitSoundTimer--;
    if (boss.damageFlash > 0) boss.damageFlash--;
    if (boss.hitFlash > 0) boss.hitFlash--;

    const minX = boss.width * 0.34;
    const maxX = canvas.width - boss.width * 0.34;
    const minY = boss.height * 0.34;
    const maxY = canvas.height - boss.height * 0.34;

    if (boss.isAngry) {
        boss.wobblePhase += 0.28 + boss.phase * 0.03;
        const angerProgress = 1 - (boss.angryTimer / 120);
        boss.angerScale = 1 + Math.sin(angerProgress * Math.PI) * 0.3;
        const dashStrength = boss.angryTimer > 72 ? 0.22 : 0.12;
        if (boss.targetPos) {
            boss.x += (boss.targetPos.x - boss.x) * dashStrength;
            boss.y += (boss.targetPos.y - boss.y) * dashStrength;
        }
        boss.x = clamp(boss.x, minX, maxX);
        boss.y = clamp(boss.y, minY, maxY);
        boss.angryTimer--;
        if (boss.angryTimer <= 0) {
            finishBossAngerTransition();
        }
        return;
    }

    boss.angerScale = 1;
    boss.wobblePhase += 0.055 + boss.phase * 0.012 + bossNumber * 0.008;
    const targetX = ship ? ship.x : canvas.width * 0.24;
    const targetY = ship ? ship.y : canvas.height * 0.5;
    const chaseAngle = Math.atan2(targetY - boss.y, targetX - boss.x);
    const phaseSpeed = boss.speed * getBossPhaseSpeedMultiplier(boss.phase);
    const desiredVx = Math.cos(chaseAngle) * phaseSpeed;
    const desiredVy = Math.sin(chaseAngle) * phaseSpeed;
    const steering = (0.038 + bossNumber * 0.004) * getBossPhaseSteeringMultiplier(boss.phase);

    boss.dx += (desiredVx - boss.dx) * steering;
    boss.dy += (desiredVy - boss.dy) * steering;
    boss.pushBackVx *= 0.88;
    boss.pushBackVy *= 0.88;
    boss.x += boss.dx + boss.pushBackVx;
    boss.y += boss.dy + boss.pushBackVy;

    if (!boss.entered && boss.x <= maxX) {
        boss.entered = true;
    }

    if (boss.x < minX) {
        boss.x = minX;
        boss.dx = Math.max(0, boss.dx) * 0.45;
        boss.pushBackVx = Math.max(0.18, boss.pushBackVx * 0.3);
    } else if (boss.entered && boss.x > maxX) {
        boss.x = maxX;
        boss.dx = Math.min(0, boss.dx) * 0.45;
        boss.pushBackVx = Math.min(-0.18, boss.pushBackVx * 0.3);
    }

    if (boss.y < minY) {
        boss.y = minY;
        boss.dy = Math.max(0, boss.dy) * 0.45;
        boss.pushBackVy = Math.max(0.14, boss.pushBackVy * 0.3);
    } else if (boss.y > maxY) {
        boss.y = maxY;
        boss.dy = Math.min(0, boss.dy) * 0.45;
        boss.pushBackVy = Math.min(-0.14, boss.pushBackVy * 0.3);
    }

    if (bossAsteroidSpawnTimer > 0) bossAsteroidSpawnTimer--;
    if (bossAsteroidSpawnTimer <= 0) {
        const maxAsteroids = 3 + bossNumber + (boss.phase - 1) * 2;
        const spawnCount = boss.phase === 1 ? 1 : boss.phase === 2 ? (Math.random() < 0.55 ? 2 : 1) : (Math.random() < 0.4 ? 3 : 2);
        for (let i = 0; i < spawnCount && asteroids.length < maxAsteroids; i++) {
            spawnBossAsteroid();
        }
        scheduleNextBossAsteroid();
    }
}

function getEnemySpawnPoint(radius) {
    const side = Math.floor(Math.random() * 4);
    if (side === 0) return { x: -radius - 6, y: Math.random() * canvas.height };
    if (side === 1) return { x: canvas.width + radius + 6, y: Math.random() * canvas.height };
    if (side === 2) return { x: Math.random() * canvas.width, y: -radius - 6 };
    return { x: Math.random() * canvas.width, y: canvas.height + radius + 6 };
}

function createEnemy() {
    const spawn = getEnemySpawnPoint(ENEMY_COLLISION_RADIUS);
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.8 + Math.random() * 0.7;
    return {
        type: 'green',
        x: spawn.x,
        y: spawn.y,
        dx: Math.cos(angle) * speed,
        dy: Math.sin(angle) * speed,
        radius: ENEMY_COLLISION_RADIUS,
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.03 + Math.random() * 0.02,
        rotWobble: 0,
        shootTimer: 180 + Math.floor(Math.random() * 120),
        dirChangeTimer: 120 + Math.floor(Math.random() * 180),
        lightPhases: [Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28],
        lightSpeeds: [0.08 + Math.random() * 0.06, 0.1 + Math.random() * 0.05, 0.07 + Math.random() * 0.08, 0.09 + Math.random() * 0.04]
    };
}

function createRedEnemy() {
    const spawn = getEnemySpawnPoint(RED_ENEMY_COLLISION_RADIUS);
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.2 + Math.random() * 0.6;
    return {
        type: 'red',
        x: spawn.x,
        y: spawn.y,
        dx: Math.cos(angle) * speed,
        dy: Math.sin(angle) * speed,
        radius: RED_ENEMY_COLLISION_RADIUS,
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.04 + Math.random() * 0.025,
        rotWobble: 0,
        shootTimer: 90 + Math.floor(Math.random() * 91),
        dirChangeTimer: 90 + Math.floor(Math.random() * 150),
        lightPhases: [Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28],
        lightSpeeds: [0.1 + Math.random() * 0.07, 0.08 + Math.random() * 0.08, 0.12 + Math.random() * 0.06, 0.09 + Math.random() * 0.08, 0.11 + Math.random() * 0.05]
    };
}

function createEnemyBullet(enemy, targetShip, targetPoint = null) {
    const target = targetPoint || targetShip;
    const angle = Math.atan2(target.y - enemy.y, target.x - enemy.x);
    const speed = enemy.type === 'red' ? RED_ENEMY_BULLET_SPEED : ENEMY_BULLET_SPEED;
    return {
        x: enemy.x + Math.cos(angle) * 44,
        y: enemy.y + Math.sin(angle) * 18,
        dx: Math.cos(angle) * speed + enemy.dx * 0.25,
        dy: Math.sin(angle) * speed + enemy.dy * 0.25,
        radius: 6,
        life: ENEMY_BULLET_LIFE,
        type: enemy.type,
        color: enemy.type === 'red' ? 'red' : 'green'
    };
}

function generateTitleAsteroids() {
    const count = Math.max(4, Math.min(7, Math.floor(canvas.width / 320)));
    titleAsteroids = Array.from({ length: count }, () => {
        const asteroid = createAsteroid(
            Math.random() * canvas.width,
            Math.random() * canvas.height,
            Math.random() > 0.45 ? 3 : 2
        );
        asteroid.dx *= 0.18;
        asteroid.dy *= 0.18;
        asteroid.rotSpeed *= 0.4;
        return asteroid;
    });
}

function generateTitleStars() {
    titleStars = Array.from({ length: 55 }, () => {
        const twinkleType = Math.random();
        return {
            x: canvas.width * (0.02 + Math.random() * 0.96),
            y: canvas.height * (0.03 + Math.random() * 0.94),
            size: 3 + Math.random() * 7,
            phase: Math.random() * Math.PI * 2,
            speed: 1.5 + Math.random() * 2,
            alpha: 0.4 + Math.random() * 0.5,
            coreSize: 1.0 + Math.random() * 1.2,
            tint: Math.random() > 0.5 ? '220, 240, 255' : (Math.random() > 0.5 ? '255, 230, 200' : '200, 220, 255'),
            // twinkle modes: 'flash' = dramatic bright bursts, 'pulse' = gentle, 'sparkle' = rapid flicker
            mode: twinkleType < 0.35 ? 'flash' : (twinkleType < 0.65 ? 'sparkle' : 'pulse'),
            flashInterval: 3 + Math.random() * 5 // seconds between flashes
        };
    });
}

function ensureTitlePortraitCache(drawWidth, drawHeight) {
    const width = Math.max(1, Math.round(drawWidth));
    const height = Math.max(1, Math.round(drawHeight));

    const portrait = activePortrait();
    if (!portrait.complete || !portrait.naturalWidth) {
        return null;
    }

    if (titlePortraitCache && titlePortraitCacheWidth === width && titlePortraitCacheHeight === height) {
        return titlePortraitCache;
    }

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = width;
    tempCanvas.height = height;

    // Cover the target width, top-anchored, preserving aspect ratio so both the
    // square Doof portrait and the taller Devyn portrait frame nicely.
    const coverScale = width / portrait.naturalWidth;
    const drawW = portrait.naturalWidth * coverScale;
    const drawH = portrait.naturalHeight * coverScale;
    tempCtx.drawImage(
        portrait,
        (width - drawW) / 2,
        0,
        drawW,
        drawH
    );

    tempCtx.globalCompositeOperation = 'destination-in';
    const mask = tempCtx.createLinearGradient(0, height * 0.56, 0, height);
    mask.addColorStop(0, 'rgba(0,0,0,1)');
    mask.addColorStop(1, 'rgba(0,0,0,0)');
    tempCtx.fillStyle = mask;
    tempCtx.fillRect(0, 0, width, height);

    titlePortraitCache = tempCanvas;
    titlePortraitCacheWidth = width;
    titlePortraitCacheHeight = height;
    portraitGlowCache = null;
    portraitGlowCacheSize = 0;
    return titlePortraitCache;
}

function ensurePortraitGlowCache(maskedPortrait, size) {
    const roundedSize = Math.max(1, Math.round(size));

    if (!maskedPortrait) {
        return null;
    }

    if (portraitGlowCache && portraitGlowCacheSize === roundedSize) {
        return portraitGlowCache;
    }

    const totalSize = roundedSize + TITLE_PORTRAIT_GLOW_PADDING * 2;
    portraitGlowCache = document.createElement('canvas');
    portraitGlowCache.width = totalSize;
    portraitGlowCache.height = totalSize;
    const glowCtx = portraitGlowCache.getContext('2d');

    glowCtx.save();
    glowCtx.shadowColor = 'rgba(110, 230, 255, 0.7)';
    glowCtx.shadowBlur = 42;
    glowCtx.drawImage(maskedPortrait, TITLE_PORTRAIT_GLOW_PADDING, TITLE_PORTRAIT_GLOW_PADDING, roundedSize, roundedSize);
    glowCtx.restore();

    glowCtx.save();
    glowCtx.globalCompositeOperation = 'screen';
    glowCtx.globalAlpha = 0.3;
    glowCtx.shadowColor = 'rgba(255, 255, 255, 0.95)';
    glowCtx.shadowBlur = 24;
    glowCtx.drawImage(maskedPortrait, TITLE_PORTRAIT_GLOW_PADDING, TITLE_PORTRAIT_GLOW_PADDING, roundedSize, roundedSize);
    glowCtx.restore();

    glowCtx.drawImage(maskedPortrait, TITLE_PORTRAIT_GLOW_PADDING, TITLE_PORTRAIT_GLOW_PADDING, roundedSize, roundedSize);

    portraitGlowCacheSize = roundedSize;
    return portraitGlowCache;
}

function getSpacedTextMetrics(text, spacing, drawCtx = ctx) {
    const letters = Array.from(text);
    const widths = letters.map(letter => drawCtx.measureText(letter).width);
    const totalWidth = widths.reduce((sum, width) => sum + width, 0) + spacing * Math.max(0, letters.length - 1);
    return { letters, widths, totalWidth };
}

function drawSpacedText(text, x, y, spacing, drawMode = 'fill', drawCtx = ctx) {
    const { letters, widths, totalWidth } = getSpacedTextMetrics(text, spacing, drawCtx);
    let cursor = x - totalWidth / 2;

    drawCtx.save();
    drawCtx.textAlign = 'left';
    for (let i = 0; i < letters.length; i++) {
        if (drawMode === 'stroke') {
            drawCtx.strokeText(letters[i], cursor, y);
        } else {
            drawCtx.fillText(letters[i], cursor, y);
        }
        cursor += widths[i] + spacing;
    }
    drawCtx.restore();
}

function getWaveGoldColor(wave) {
    const brightness = 0.7 + wave * 0.3;
    return `rgb(${Math.floor(255 * brightness)}, ${Math.floor(215 * brightness)}, ${Math.floor(70 * (0.6 + brightness * 0.4))})`;
}

function drawPixelWaveText(text, baseX, baseY, time, waveAmp, waveSpeed, waveOffset, spacing = 0, drawMode = 'fill', drawCtx = ctx, fillStyleFn = null) {
    const { letters, widths, totalWidth } = getSpacedTextMetrics(text, spacing, drawCtx);
    let cursor = baseX - totalWidth / 2;

    drawCtx.save();
    drawCtx.textAlign = 'left';
    const originalFillStyle = drawCtx.fillStyle;
    for (let i = 0; i < letters.length; i++) {
        const wave = Math.sin(time * waveSpeed + i * waveOffset);
        const yOffset = wave * waveAmp;
        if (drawMode === 'stroke') {
            if (letters[i] !== ' ') {
                drawCtx.strokeText(letters[i], cursor, baseY + yOffset);
            }
        } else {
            if (fillStyleFn && letters[i] !== ' ') {
                drawCtx.fillStyle = fillStyleFn(wave, i, letters[i]);
            } else {
                drawCtx.fillStyle = originalFillStyle;
            }
            drawCtx.fillText(letters[i], cursor, baseY + yOffset);
        }
        cursor += widths[i] + spacing;
    }
    drawCtx.restore();
}

function ensureDynamicPixelCanvas(existingCanvas, width, height) {
    const safeWidth = Math.max(1, Math.ceil(width));
    const safeHeight = Math.max(1, Math.ceil(height));
    const canvasRef = existingCanvas || document.createElement('canvas');
    if (canvasRef.width !== safeWidth || canvasRef.height !== safeHeight) {
        canvasRef.width = safeWidth;
        canvasRef.height = safeHeight;
    }
    return canvasRef;
}

function drawPixelCanvas(sourceCanvas, x, y, width, height, glowColor, glowBlur, glowAlpha = 0.7) {
    if (!sourceCanvas) {
        return;
    }

    if (glowColor && glowBlur > 0 && glowAlpha > 0) {
        const glowOffset = Math.max(1, Math.round(glowBlur / 10));
        const glowLayers = [
            [-1, 0],
            [1, 0],
            [0, -1],
            [0, 1]
        ];
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = glowAlpha * 0.18;
        ctx.imageSmoothingEnabled = false;
        for (const [dx, dy] of glowLayers) {
            ctx.drawImage(sourceCanvas, x + dx * glowOffset, y + dy * glowOffset, width, height);
        }
        ctx.restore();
    }

    const previousSmoothing = ctx.imageSmoothingEnabled;
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sourceCanvas, x, y, width, height);
    ctx.restore();
    ctx.imageSmoothingEnabled = previousSmoothing;
}

function getGunTipPosition(ship) {
    return {
        x: ship.x + Math.cos(ship.angle) * GUN_TIP_X - Math.sin(ship.angle) * GUN_TIP_Y,
        y: ship.y + Math.sin(ship.angle) * GUN_TIP_X + Math.cos(ship.angle) * GUN_TIP_Y
    };
}

function createBullet(ship) {
    const gunTip = getGunTipPosition(ship);

    for (let i = 0; i < 5; i++) {
        const spread = (Math.random() - 0.5) * 0.5;
        particles.push({
            x: gunTip.x,
            y: gunTip.y,
            dx: Math.cos(ship.angle + spread) * (2 + Math.random() * 2),
            dy: Math.sin(ship.angle + spread) * (2 + Math.random() * 2),
            life: 8 + Math.random() * 6,
            color: Math.random() > 0.5 ? '#ff3300' : '#ffcc00',
            size: 2 + Math.random() * 1.5
        });
    }

    return {
        x: gunTip.x,
        y: gunTip.y,
        dx: Math.cos(ship.angle) * BULLET_SPEED + ship.dx * 0.5,
        dy: Math.sin(ship.angle) * BULLET_SPEED + ship.dy * 0.5,
        life: BULLET_LIFE
    };
}

function ensureAudioContext() {
    const AudioCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtor) return null;

    if (!audioContext) {
        audioContext = new AudioCtor();
    }

    if (audioContext.state === 'suspended') {
        audioContext.resume().catch(() => {});
    }

    return audioContext;
}

function playTone({ type = 'sine', frequency = 440, frequencyEnd = null, duration = 0.12, volume = 0.05, attack = 0.005, release = 0.08, when = 0 }) {
    const audio = ensureAudioContext();
    if (!audio) return;

    const start = audio.currentTime + when;
    const end = start + duration;
    const oscillator = audio.createOscillator();
    const gainNode = audio.createGain();

    oscillator.type = type;
    oscillator.frequency.setValueAtTime(frequency, start);
    if (frequencyEnd !== null) {
        oscillator.frequency.exponentialRampToValueAtTime(Math.max(20, frequencyEnd), end);
    }

    gainNode.gain.setValueAtTime(0.0001, start);
    gainNode.gain.linearRampToValueAtTime(volume, start + attack);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, end + release);

    oscillator.connect(gainNode);
    gainNode.connect(audio.destination);
    oscillator.start(start);
    oscillator.stop(end + release + 0.02);
}

function startLaserHum() {
    if (laserHum) return;

    const audio = ensureAudioContext();
    if (!audio) return;

    const oscillator = audio.createOscillator();
    const modulator = audio.createOscillator();
    const modGain = audio.createGain();
    const gainNode = audio.createGain();

    oscillator.type = 'sawtooth';
    oscillator.frequency.value = 110;
    modulator.type = 'sine';
    modulator.frequency.value = 7;
    modGain.gain.value = 12;

    modulator.connect(modGain);
    modGain.connect(oscillator.frequency);

    gainNode.gain.setValueAtTime(0.0001, audio.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.12, audio.currentTime + 0.06);

    oscillator.connect(gainNode);
    gainNode.connect(audio.destination);

    oscillator.start();
    modulator.start();

    laserHum = { oscillator, modulator, gainNode };
}

function stopLaserHum() {
    if (!laserHum || !audioContext) return;

    const stopAt = audioContext.currentTime + 0.08;
    laserHum.gainNode.gain.cancelScheduledValues(audioContext.currentTime);
    laserHum.gainNode.gain.setValueAtTime(Math.max(0.0001, laserHum.gainNode.gain.value), audioContext.currentTime);
    laserHum.gainNode.gain.exponentialRampToValueAtTime(0.0001, stopAt);
    laserHum.oscillator.stop(stopAt + 0.02);
    laserHum.modulator.stop(stopAt + 0.02);
    laserHum = null;
}

function scheduleNextPickupSpawn() {
    const minSpawn = difficulty === 'easy' ? PICKUP_MIN_SPAWN * 0.5 : PICKUP_MIN_SPAWN;
    const maxSpawn = difficulty === 'easy' ? PICKUP_MAX_SPAWN * 0.5 : PICKUP_MAX_SPAWN;
    pickupSpawnTimer = Math.floor(minSpawn + Math.random() * (maxSpawn - minSpawn + 1));
}

function createSpecialWeapon(type = null) {
    const mult = difficulty === 'easy' ? 2 : 1;
    if (type === 'laser') return { type: 'laser', ammo: LASER_TOTAL_AMMO * mult, energy: LASER_ENERGY_MAX };
    if (type === 'pulse') return { type, ammo: PULSE_SHOTS * mult, energy: 0 };
    if (type === 'homing') return { type, ammo: HOMING_SHOTS * mult, energy: 0 };
    return { type: null, ammo: 0, energy: 0 };
}

function assignSpecialWeapon(type) {
    if (!ship) return;
    ship.specialWeapon = createSpecialWeapon(type);
    laserBeam = null;
    stopLaserHum();
}

function createPickup(type, x = Math.random() * canvas.width, y = Math.random() * canvas.height) {
    const labels = { laser: 'LASER', pulse: 'PULSE', homing: 'HOMING', shield: 'SHIELD' };
    return {
        type,
        label: labels[type],
        x,
        y,
        dx: (Math.random() - 0.5) * 0.8,
        dy: (Math.random() - 0.5) * 0.8,
        radius: PICKUP_RADIUS,
        life: PICKUP_LIFE,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.08
    };
}

function spawnPickup() {
    if (pickups.length >= 2) return;

    const types = ['laser', 'pulse', 'homing'];
    const type = types[Math.floor(Math.random() * types.length)];
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;
    let attempts = 0;

    while (ship && dist(x, y, ship.x, ship.y) < 180 && attempts < 12) {
        x = Math.random() * canvas.width;
        y = Math.random() * canvas.height;
        attempts++;
    }

    pickups.push(createPickup(type, x, y));
}

function createPulseWave(ship) {
    return {
        x: ship.x,
        y: ship.y,
        radius: ship.radius * 0.35,
        maxRadius: PULSE_RADIUS,
        speed: PULSE_SPEED,
        life: Math.ceil(PULSE_RADIUS / PULSE_SPEED) + 10,
        bossHit: false
    };
}

function createHomingMissile(ship) {
    const gunTip = getGunTipPosition(ship);
    return {
        x: gunTip.x,
        y: gunTip.y,
        dx: Math.cos(ship.angle) * MISSILE_SPEED + ship.dx * 0.4,
        dy: Math.sin(ship.angle) * MISSILE_SPEED + ship.dy * 0.4,
        angle: ship.angle,
        radius: 8,
        life: 600 // 10 seconds max
    };
}

function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function normalizeAngle(angle) {
    while (angle > Math.PI) angle -= Math.PI * 2;
    while (angle < -Math.PI) angle += Math.PI * 2;
    return angle;
}

function getClosestTarget(x, y) {
    let closest = null;
    let closestDistance = Infinity;

    for (const asteroid of asteroids) {
        const distance = dist(x, y, asteroid.x, asteroid.y);
        if (distance < closestDistance) {
            closestDistance = distance;
            closest = asteroid;
        }
    }

    for (const enemy of enemies) {
        const distance = dist(x, y, enemy.x, enemy.y);
        if (distance < closestDistance) {
            closestDistance = distance;
            closest = enemy;
        }
    }

    if (boss && gameState === 'boss') {
        const distance = dist(x, y, boss.x, boss.y);
        if (distance < closestDistance) {
            closestDistance = distance;
            closest = boss;
        }
    }

    return closest;
}

function getBeamEndpoint(x, y, angle) {
    const dx = Math.cos(angle);
    const dy = Math.sin(angle);
    const distances = [];

    if (dx > 0) distances.push((canvas.width - x) / dx);
    else if (dx < 0) distances.push((0 - x) / dx);

    if (dy > 0) distances.push((canvas.height - y) / dy);
    else if (dy < 0) distances.push((0 - y) / dy);

    const distanceToEdge = Math.min(...distances.filter(value => value >= 0));
    return {
        x: x + dx * distanceToEdge,
        y: y + dy * distanceToEdge
    };
}

function lineCircleIntersect(x1, y1, x2, y2, cx, cy, radius) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const lineLengthSq = dx * dx + dy * dy;

    if (lineLengthSq === 0) {
        return dist(x1, y1, cx, cy) <= radius;
    }

    const projection = ((cx - x1) * dx + (cy - y1) * dy) / lineLengthSq;
    const clampedProjection = clamp(projection, 0, 1);
    const closestX = x1 + dx * clampedProjection;
    const closestY = y1 + dy * clampedProjection;
    return dist(closestX, closestY, cx, cy) <= radius;
}

function addScore(points) {
    score += points;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('asteroids_high', highScore.toString());
    }
}

function destroyAsteroid(index, effectColor = '#fff') {
    const asteroid = asteroids[index];
    if (!asteroid) return;

    createExplosion(asteroid.x, asteroid.y, 8, effectColor);

    const points = asteroid.size === 3 ? 20 : asteroid.size === 2 ? 50 : 100;
    addScore(points);

    if (asteroid.size > 1) {
        const newSize = asteroid.size - 1;
        asteroids.push(createAsteroid(asteroid.x, asteroid.y, newSize));
        asteroids.push(createAsteroid(asteroid.x, asteroid.y, newSize));
    }

    asteroids.splice(index, 1);
}

function createShipExplosionState(x, y, radius = 120, firePalette = ['#ffdd00', '#ff8800', '#ff3300'], smokeRgb = '40, 40, 40', coreOuterRgb = '255, 220, 120') {
    return {
        x, y,
        life: 60,
        maxLife: 60,
        radius,
        firePalette,
        smokeRgb,
        coreOuterRgb,
        blobs: Array.from({ length: 10 }, () => ({
            angle: Math.random() * Math.PI * 2,
            dist: Math.random() * 0.6 + 0.2,
            size: Math.random() * 0.4 + 0.3,
            colorIdx: Math.floor(Math.random() * firePalette.length)
        })),
        smokeBlobs: Array.from({ length: 6 }, () => ({
            angle: Math.random() * Math.PI * 2,
            dist: Math.random() * 0.4 + 0.5,
            size: Math.random() * 0.3 + 0.4
        }))
    };
}

function destroyPlayerShip() {
    if (!ship) return;

    const ex = ship.x;
    const ey = ship.y;
    for (let i = 0; i < 40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        const colors = ['#ff3300', '#ff6600', '#ffcc00', '#fff', '#ff9900'];
        particles.push({
            x: ex, y: ey,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 30 + Math.random() * 30,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: 2 + Math.random() * 4
        });
    }

    shipExplosion = createShipExplosionState(ex, ey, 120);
    ejectedPug = {
        x: ex,
        y: ey,
        dx: ship.dx * 0.3 + (Math.random() - 0.5) * 0.5,
        dy: ship.dy * 0.3 - 0.3,
        rotation: ship.angle,
        rotSpeed: (Math.random() - 0.5) * 0.02,
        life: PUG_FLOAT_DURATION
    };
    screenShakeTimer = Math.max(screenShakeTimer, 14);
    lives--;
    hpFlashTimer = 0;
    laserBeam = null;
    missiles = []; // Clear player missiles on death
    pulseWaves = [];
    playExplosionSound();
    setTimeout(() => playDeathJingle(), 300);
    switchMusic(null);
    stopLaserHum();
    stopThruster();
    ship = null;
    if (lives <= 0) {
        gameOver = true;
        gameState = 'gameover';
    } else {
        respawnTimer = RESPAWN_DELAY;
    }
}

function destroyEnemy(index, effectColor = '#66ff99') {
    const enemy = enemies[index];
    if (!enemy) return;

    const isRedEnemy = enemy.type === 'red';
    const explosionPalette = isRedEnemy
        ? [['#ffd58a', '#ff5533', '#ff2222'], '70, 26, 20', '255, 150, 90']
        : [['#d9ff8a', '#44ff44', '#cc44ff'], '52, 28, 70', '120, 255, 170'];
    const debrisColors = isRedEnemy
        ? ['#ff2222', '#ff6600', '#ffb366', '#ffe0a8']
        : ['#44ff44', '#7fff7f', '#cc44ff', '#f1b6ff'];

    createExplosion(enemy.x, enemy.y, 18, effectColor);
    enemyExplosions.push(createShipExplosionState(enemy.x, enemy.y, 100, explosionPalette[0], explosionPalette[1], explosionPalette[2]));

    for (let i = 0; i < 24; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4.5;
        particles.push({
            x: enemy.x,
            y: enemy.y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 24 + Math.random() * 24,
            color: debrisColors[Math.floor(Math.random() * debrisColors.length)],
            size: 2 + Math.random() * 4
        });
    }

    if (Math.random() < 0.2) {
        pickups.push(createPickup('shield', enemy.x, enemy.y));
    }

    screenShakeTimer = Math.max(screenShakeTimer, isRedEnemy ? 12 : 10);
    addScore(isRedEnemy ? 350 : 200);
    playExplosionSound();
    enemies.splice(index, 1);
}

function absorbShieldHit(x, y) {
    if (!ship || !ship.shield) return false;

    ship.shield = false;
    ship.invincible = 45; // brief invincibility after shield break
    shieldFlashTimer = 8;
    screenShakeTimer = Math.max(screenShakeTimer, 12);
    playShieldBreakSound();

    // Shield burst particles
    for (let i = 0; i < 22; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 4;
        particles.push({
            x,
            y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 16 + Math.random() * 18,
            color: Math.random() > 0.5 ? '#44aaff' : '#b8ecff',
            size: 2 + Math.random() * 2.5
        });
    }

    // Shield explosion destroys nearby threats
    const blastRadius = 120;
    for (let i = asteroids.length - 1; i >= 0; i--) {
        if (dist(x, y, asteroids[i].x, asteroids[i].y) < blastRadius) {
            destroyAsteroid(i, '#44aaff');
        }
    }
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        if (dist(x, y, enemyBullets[i].x, enemyBullets[i].y) < blastRadius) {
            createExplosion(enemyBullets[i].x, enemyBullets[i].y, 4, '#66ccff');
            enemyBullets.splice(i, 1);
        }
    }

    createExplosion(x, y, 16, '#66ccff');
    return true;
}

function damagePlayerShip(hitX = ship ? ship.x : 0, hitY = ship ? ship.y : 0) {
    if (!ship) return false;

    if (difficulty === 'easy' && ship.hitPoints > 1) {
        ship.hitPoints--;
        ship.invincible = 120;
        ship.hitFlash = 24;
        hpFlashTimer = 24;
        screenShakeTimer = Math.max(screenShakeTimer, 10);
        laserBeam = null;
        stopLaserHum();
        playPlayerHitSound();
        createExplosion(hitX, hitY, 12, '#ff6b7d');
        return false;
    }

    destroyPlayerShip();
    return true;
}

function handleEnemyBulletShipCollisions() {
    if (!ship || gameState === 'bossDefeated') return false;

    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        if (dist(ship.x, ship.y, bullet.x, bullet.y) < ship.radius * 0.7 + bullet.radius) {
            enemyBullets.splice(i, 1);
            if (absorbShieldHit(ship.x, ship.y)) {
                return true;
            }
            damagePlayerShip(bullet.x, bullet.y);
            return true;
        }
    }

    return false;
}

function updatePickups() {
    for (let i = pickups.length - 1; i >= 0; i--) {
        const pickup = pickups[i];
        pickup.x += pickup.dx;
        pickup.y += pickup.dy;
        pickup.angle += pickup.spin;
        pickup.life--;
        wrap(pickup);

        if (pickup.life <= 0) {
            pickups.splice(i, 1);
        }
    }
}

function handlePickupCollection(ship) {
    for (let i = pickups.length - 1; i >= 0; i--) {
        const pickup = pickups[i];
        if (dist(ship.x, ship.y, pickup.x, pickup.y) < ship.radius * 0.8 + pickup.radius) {
            if (pickup.type === 'shield') {
                ship.shield = true;
            } else {
                assignSpecialWeapon(pickup.type);
            }
            createExplosion(pickup.x, pickup.y, 14, pickup.type === 'laser' ? '#66e6ff' : pickup.type === 'pulse' ? '#9a7dff' : pickup.type === 'homing' ? '#ff8a45' : '#44aaff');
            playPickupSound();
            pickups.splice(i, 1);
        }
    }
}

function updatePulseWaves() {
    for (let i = pulseWaves.length - 1; i >= 0; i--) {
        const wave = pulseWaves[i];
        wave.radius += wave.speed;
        wave.life--;

        for (let spark = 0; spark < 3; spark++) {
            const angle = Math.random() * Math.PI * 2;
            const sparkRadius = Math.max(0, wave.radius + (Math.random() - 0.5) * 12);
            particles.push({
                x: wave.x + Math.cos(angle) * sparkRadius,
                y: wave.y + Math.sin(angle) * sparkRadius,
                dx: Math.cos(angle) * (1 + Math.random() * 2),
                dy: Math.sin(angle) * (1 + Math.random() * 2),
                life: 12 + Math.random() * 10,
                color: Math.random() > 0.5 ? '#66d9ff' : '#a56dff',
                size: 2 + Math.random() * 2
            });
        }

        for (let j = asteroids.length - 1; j >= 0; j--) {
            if (dist(wave.x, wave.y, asteroids[j].x, asteroids[j].y) <= wave.radius + asteroids[j].radius) {
                destroyAsteroid(j, '#8a7dff');
            }
        }

        for (let j = enemies.length - 1; j >= 0; j--) {
            if (dist(wave.x, wave.y, enemies[j].x, enemies[j].y) <= wave.radius + enemies[j].radius) {
                destroyEnemy(j, '#99fff0');
            }
        }

        if (boss && gameState === 'boss' && !wave.bossHit && dist(wave.x, wave.y, boss.x, boss.y) <= wave.radius + boss.radius) {
            damageBoss(4, wave.x, wave.y, 3.6, '#b69dff');
            wave.bossHit = true;
        }

        // Pulse wave destroys enemy bullets
        for (let j = enemyBullets.length - 1; j >= 0; j--) {
            if (dist(wave.x, wave.y, enemyBullets[j].x, enemyBullets[j].y) <= wave.radius + enemyBullets[j].radius) {
                createExplosion(enemyBullets[j].x, enemyBullets[j].y, 4, '#a56dff');
                enemyBullets.splice(j, 1);
            }
        }

        if (wave.radius >= wave.maxRadius || wave.life <= 0) {
            pulseWaves.splice(i, 1);
        }
    }
}

function updateMissiles() {
    for (let i = missiles.length - 1; i >= 0; i--) {
        const missile = missiles[i];
        missile.life--;
        // Generous timeout: 10 seconds, then self-destruct
        if (missile.life <= 0) {
            createExplosion(missile.x, missile.y, 4, '#ff8844');
            missiles.splice(i, 1);
            continue;
        }
        const target = getClosestTarget(missile.x, missile.y);

        if (target) {
            const desiredAngle = Math.atan2(target.y - missile.y, target.x - missile.x);
            const angleDelta = normalizeAngle(desiredAngle - missile.angle);
            missile.angle += clamp(angleDelta, -MISSILE_TURN_SPEED, MISSILE_TURN_SPEED);
        }

        missile.dx = Math.cos(missile.angle) * MISSILE_SPEED;
        missile.dy = Math.sin(missile.angle) * MISSILE_SPEED;
        missile.x += missile.dx;
        missile.y += missile.dy;
        wrap(missile);

        particles.push({
            x: missile.x - Math.cos(missile.angle) * 10,
            y: missile.y - Math.sin(missile.angle) * 10,
            dx: -Math.cos(missile.angle) * (1.2 + Math.random() * 1.5),
            dy: -Math.sin(missile.angle) * (1.2 + Math.random() * 1.5),
            life: 10 + Math.random() * 8,
            color: Math.random() > 0.5 ? '#ff7b39' : '#ffd16b',
            size: 2 + Math.random() * 1.5
        });

        let hit = false;
        for (let j = asteroids.length - 1; j >= 0; j--) {
            if (dist(missile.x, missile.y, asteroids[j].x, asteroids[j].y) < missile.radius + asteroids[j].radius) {
                createExplosion(missile.x, missile.y, 6, '#ff8844');
                destroyAsteroid(j, '#ff8844');
                missiles.splice(i, 1);
                hit = true;
                break;
            }
        }

        if (hit) continue;

        for (let j = enemies.length - 1; j >= 0; j--) {
            if (dist(missile.x, missile.y, enemies[j].x, enemies[j].y) < missile.radius + enemies[j].radius) {
                createExplosion(missile.x, missile.y, 8, '#7dff9c');
                destroyEnemy(j, '#7dff9c');
                missiles.splice(i, 1);
                hit = true;
                break;
            }
        }

        if (hit) continue;

        // Missiles destroy enemy bullets
        for (let j = enemyBullets.length - 1; j >= 0; j--) {
            if (dist(missile.x, missile.y, enemyBullets[j].x, enemyBullets[j].y) < missile.radius + enemyBullets[j].radius) {
                createExplosion(enemyBullets[j].x, enemyBullets[j].y, 4, '#ff8844');
                enemyBullets.splice(j, 1);
                missiles.splice(i, 1);
                hit = true;
                break;
            }
        }

        if (hit) continue;

        if (boss && gameState === 'boss' && dist(missile.x, missile.y, boss.x, boss.y) < missile.radius + boss.radius * 0.9) {
            const hitLanded = damageBoss(5, missile.x, missile.y, 6, '#ffb0cf');
            createExplosion(missile.x, missile.y, hitLanded ? 10 : 6, hitLanded ? '#ff9d74' : '#ffd7e8');
            missiles.splice(i, 1);
            continue;
        }
    }
}

function handleBulletAsteroidCollisions() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        let hit = false;

        for (let j = enemies.length - 1; j >= 0; j--) {
            if (dist(bullets[i].x, bullets[i].y, enemies[j].x, enemies[j].y) < enemies[j].radius) {
                destroyEnemy(j);
                bullets.splice(i, 1);
                hit = true;
                break;
            }
        }

        if (hit) continue;

        if (boss && gameState === 'boss' && dist(bullets[i].x, bullets[i].y, boss.x, boss.y) < boss.radius * 0.95) {
            const hitLanded = damageBoss(1, bullets[i].x, bullets[i].y, 2.4, '#ff8fc2');
            if (hitLanded) {
                bullets.splice(i, 1);
            } else if (boss.invincible) {
                deflectBulletFromBoss(bullets[i]);
            }
            continue;
        }

        // Player bullets can destroy enemy bullets
        for (let j = enemyBullets.length - 1; j >= 0; j--) {
            if (dist(bullets[i].x, bullets[i].y, enemyBullets[j].x, enemyBullets[j].y) < enemyBullets[j].radius + 4) {
                createExplosion(enemyBullets[j].x, enemyBullets[j].y, 4, enemyBullets[j].type === 'red' ? '#ff6633' : '#44ff88');
                enemyBullets.splice(j, 1);
                bullets.splice(i, 1);
                hit = true;
                break;
            }
        }

        if (hit) continue;

        for (let j = asteroids.length - 1; j >= 0; j--) {
            if (dist(bullets[i].x, bullets[i].y, asteroids[j].x, asteroids[j].y) < asteroids[j].radius) {
                destroyAsteroid(j);
                bullets.splice(i, 1);
                break;
            }
        }
    }
}

function updateLaserBeam(ship, firePressed) {
    laserBeam = null;
    const weapon = ship.specialWeapon;

    if (!weapon || weapon.type !== 'laser') {
        stopLaserHum();
        return false;
    }

    if (weapon.ammo <= 0) {
        ship.specialWeapon = createSpecialWeapon(null);
        stopLaserHum();
        return false;
    }

    if (!firePressed) {
        weapon.energy = Math.min(LASER_ENERGY_MAX, weapon.energy + 0.5);
        stopLaserHum();
        return false;
    }

    if (weapon.energy <= 0) {
        stopLaserHum();
        return false;
    }

    const gunTip = getGunTipPosition(ship);
    const beamEnd = getBeamEndpoint(gunTip.x, gunTip.y, ship.angle);
    weapon.energy--;
    weapon.ammo--;
    ship.shootAnim = Math.max(ship.shootAnim, 2);
    laserBeam = {
        x1: gunTip.x,
        y1: gunTip.y,
        x2: beamEnd.x,
        y2: beamEnd.y,
        flicker: 0.85 + Math.random() * 0.3
    };

    for (let spark = 0; spark < 2; spark++) {
        particles.push({
            x: gunTip.x + (Math.random() - 0.5) * 8,
            y: gunTip.y + (Math.random() - 0.5) * 8,
            dx: Math.cos(ship.angle) * (2 + Math.random() * 2),
            dy: Math.sin(ship.angle) * (2 + Math.random() * 2),
            life: 8 + Math.random() * 5,
            color: Math.random() > 0.4 ? '#66e6ff' : '#ffffff',
            size: 2 + Math.random() * 2
        });
    }

    startLaserHum();

    const asteroidHits = [];
    for (let j = asteroids.length - 1; j >= 0; j--) {
        if (lineCircleIntersect(gunTip.x, gunTip.y, beamEnd.x, beamEnd.y, asteroids[j].x, asteroids[j].y, asteroids[j].radius)) {
            asteroidHits.push(j);
        }
    }

    const enemyHits = [];
    for (let j = enemies.length - 1; j >= 0; j--) {
        if (lineCircleIntersect(gunTip.x, gunTip.y, beamEnd.x, beamEnd.y, enemies[j].x, enemies[j].y, enemies[j].radius)) {
            enemyHits.push(j);
        }
    }

    if (boss && gameState === 'boss' && lineCircleIntersect(gunTip.x, gunTip.y, beamEnd.x, beamEnd.y, boss.x, boss.y, boss.radius * 0.9)) {
        damageBoss(0.45, gunTip.x, gunTip.y, 0.9, '#ff9fca');
    }

    for (const index of asteroidHits) {
        destroyAsteroid(index, '#66e6ff');
    }

    for (const index of enemyHits) {
        destroyEnemy(index, '#99fff0');
    }

    // Laser destroys enemy bullets
    for (let j = enemyBullets.length - 1; j >= 0; j--) {
        if (lineCircleIntersect(gunTip.x, gunTip.y, beamEnd.x, beamEnd.y, enemyBullets[j].x, enemyBullets[j].y, enemyBullets[j].radius + 4)) {
            createExplosion(enemyBullets[j].x, enemyBullets[j].y, 4, '#66e6ff');
            enemyBullets.splice(j, 1);
        }
    }

    if (weapon.ammo <= 0) {
        ship.specialWeapon = createSpecialWeapon(null);
    }

    return true;
}

// Particles (explosions)
function createExplosion(x, y, count, color) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
            x, y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 30 + Math.random() * 20,
            color: color || '#fff'
        });
    }
}

// Utility
function dist(x1, y1, x2, y2) {
    return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

function wrap(obj) {
    if (obj.x < -obj.radius) obj.x = canvas.width + obj.radius;
    if (obj.x > canvas.width + obj.radius) obj.x = -obj.radius;
    if (obj.y < -obj.radius) obj.y = canvas.height + obj.radius;
    if (obj.y > canvas.height + obj.radius) obj.y = -obj.radius;
}

// Initialize game
function initGame() {
    paused = false;
    gameState = 'playing';
    switchMusic(gameMusic);
    ship = createShip();
    asteroids = spawnAsteroids(STARTING_ASTEROIDS);
    bullets = [];
    particles = [];
    pickups = [];
    pulseWaves = [];
    missiles = [];
    enemies = [];
    enemyBullets = [];
    enemyExplosions = [];
    score = 0;
    lives = 3;
    level = 1;
    gameOver = false;
    highScore = parseInt(localStorage.getItem('asteroids_high') || '0');
    respawnTimer = 0;
    pickupSpawnTimer = 0;
    levelTransitionTimer = 0;
    levelTransitionActive = false;
    laserBeam = null;
    prevFirePressed = false;
    ejectedPug = null;
    shipExplosion = null;
    screenShakeTimer = 0;
    shieldFlashTimer = 0;
    hpFlashTimer = 0;
    gameOverTimer = 0;
    enemiesRemaining = 0;
    enemySpawnTimer = 0;
    redEnemiesRemaining = 0;
    redEnemySpawnTimer = 0;
    resetBossState();
    scheduleNextPickupSpawn();
    stopLaserHum();
    stopThruster();
}

// Start next level
function nextLevel() {
    gameState = 'playing';
    level++;
    asteroids = spawnAsteroids(STARTING_ASTEROIDS + level - 1);
    bullets = [];
    pulseWaves = [];
    missiles = [];
    enemies = [];
    enemyBullets = [];
    enemyExplosions = [];
    laserBeam = null;
    screenShakeTimer = 0;
    shieldFlashTimer = 0;
    hpFlashTimer = 0;
    levelTransitionTimer = 0;
    levelTransitionActive = false;
    resetBossState();

    if (ship) {
        ship.shield = false;
        if (difficulty === 'easy') ship.hitPoints = 2;
    }

    // Enemies enter from the side at unpredictable times (not all at once)
    resetEnemyWaveForLevel(level);

    stopLaserHum();
    stopThruster();
}

function updateTitleScreen() {
    updateTitleAsteroids();
}

// Update
function update() {
    if (paused) return;
    const firePressed = keys['Space'] || keys['KeyF'];

    if (gameState === 'characterSelect' || gameState === 'title' || gameState === 'difficultySelect') {
        laserBeam = null;
        stopLaserHum();
        stopThruster();
        prevFirePressed = firePressed;
        updateTitleScreen();
        return;
    }

    if (gameState === 'gameover' || gameOver) {
        laserBeam = null;
        stopLaserHum();
        stopThruster();
        gameState = 'gameover';
        gameOver = true;
        // Keep ejected pug floating during game over
        if (ejectedPug) {
            ejectedPug.x += ejectedPug.dx;
            ejectedPug.y += ejectedPug.dy;
            ejectedPug.rotation += ejectedPug.rotSpeed;
        }
        if (shipExplosion) {
            shipExplosion.life--;
            if (shipExplosion.life <= 0) shipExplosion = null;
        }
        updateParticles();
        // Linger on game over for a few seconds, then return to character select
        if (!gameOverTimer) gameOverTimer = 240; // 4 seconds at 60fps
        gameOverTimer--;
        if (gameOverTimer <= 0) {
            returnToCharacterSelectAfterGameOver();
        }
        prevFirePressed = firePressed;
        return;
    }

    if (pickupSpawnTimer > 0) pickupSpawnTimer--;
    if (screenShakeTimer > 0) screenShakeTimer--;
    if (shieldFlashTimer > 0) shieldFlashTimer--;
    if (hpFlashTimer > 0) hpFlashTimer--;

    if (gameState === 'bossIntro') {
        laserBeam = null;
        stopLaserHum();
        stopThruster();
        updateParticles();
        updateEnemyExplosions();
        bossIntroTimer--;
        if (bossIntroTimer <= 0) {
            startBossFight();
        }
        prevFirePressed = firePressed;
        return;
    }

    if (gameState === 'bossDefeated') {
        laserBeam = null;
        stopLaserHum();
        stopThruster();
        updateParticles();
        updateEnemyExplosions();
        if (boss) {
            if (boss.damageFlash > 0) boss.damageFlash--;
            if (boss.hitFlash > 0) boss.hitFlash--;
            boss.wobblePhase += 0.08;
        }
        if (boss && bossDefeatedTimer > 190 && bossDefeatedTimer % 6 === 0) {
            createExplosion(
                boss.x + (Math.random() - 0.5) * boss.width * 0.42,
                boss.y + (Math.random() - 0.5) * boss.height * 0.34,
                5,
                Math.random() > 0.5 ? '#ff7ca7' : '#ffd8ec'
            );
        }
        bossDefeatedTimer--;
        if (bossDefeatedTimer <= 0) {
            boss = null;
            nextLevel();
            switchMusic(gameMusic);
        }
        prevFirePressed = firePressed;
        return;
    }

    if (gameState === 'playing' && pickupSpawnTimer <= 0 && !levelTransitionActive) {
        spawnPickup();
