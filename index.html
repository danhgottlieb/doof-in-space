        ctx.shadowBlur = 0;

        // Inner scanlines
        ctx.save();
        roundRect(bx + 4, by + 4, boxW - 8, boxH - 8, 14);
        ctx.clip();
        ctx.fillStyle = `${acStr}, 0.05)`;
        for (let y = by + 6; y < by + boxH; y += 4) ctx.fillRect(bx, y, boxW, 1);
        ctx.restore();

        // Border
        roundRect(bx, by, boxW, boxH, 18);
        ctx.strokeStyle = isSelected ? `${acStr}, 0.85)` : 'rgba(120, 150, 200, 0.22)';
        ctx.lineWidth = isSelected ? 3 : 1.5;
        ctx.stroke();

        // 1P tag + neon brackets on selected
        if (isSelected) {
            drawNeonBracket(bx - 8, by - 8, boxW + 16, boxH + 16, Math.min(46, boxW * 0.16), `${acStr}, ${0.7 + Math.sin(time * 5) * 0.25})`, 4);
            ctx.save();
            ctx.fillStyle = `${acStr}, 0.95)`;
            ctx.fillRect(bx + 14, by + 14, 42, 22);
            ctx.fillStyle = '#06121f';
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.fillText('1P', bx + 35, by + 26);
            ctx.restore();
        }

        // Big label
        ctx.save();
        const labelSize = Math.max(40, Math.min(boxW * 0.30, 96));
        ctx.font = `900 ${labelSize}px Impact, Haettenschweiler, "Arial Black", sans-serif`;
        ctx.lineWidth = Math.max(3, labelSize * 0.07);
        ctx.strokeStyle = '#06121f';
        ctx.strokeText(option.label, 0, -boxH * 0.10);
        if (isSelected) { ctx.shadowColor = `${acStr}, 0.95)`; ctx.shadowBlur = 22; }
        ctx.fillStyle = isSelected ? accentHex[i] : `${acStr}, 0.5)`;
        ctx.fillText(option.label, 0, -boxH * 0.10);
        ctx.restore();

        // Sublabel chip
        ctx.font = `bold ${Math.max(14, Math.min(boxW * 0.05, 22))}px "Courier New", monospace`;
        ctx.fillStyle = isSelected ? `${acStr}, 0.95)` : `${acStr}, 0.45)`;
        ctx.fillText(subLabels[i], 0, boxH * 0.16);

        // Blurb
        ctx.font = `${Math.max(11, Math.min(boxW * 0.034, 15))}px "Courier New", monospace`;
        ctx.fillStyle = isSelected ? 'rgba(220, 235, 255, 0.85)' : 'rgba(150, 175, 215, 0.55)';
        ctx.fillText(blurbs[i], 0, boxH * 0.30);

        // Nameplate bar
        const plateH = Math.max(26, boxH * 0.12);
        const plateY = by + boxH - plateH - 8;
        roundRect(bx + 12, plateY, boxW - 24, plateH, 8);
        ctx.fillStyle = isSelected ? `${acStr}, 0.92)` : 'rgba(30, 42, 66, 0.6)';
        ctx.fill();
        ctx.fillStyle = isSelected ? '#06121f' : `${acStr}, 0.6)`;
        ctx.font = `bold ${Math.max(13, Math.min(boxW * 0.045, 20))}px "Courier New", monospace`;
        ctx.fillText(isSelected ? 'SELECTED' : (touchEnabled ? 'TAP TO PICK' : 'CLICK TO PICK'), 0, plateY + plateH / 2 + 1);

        ctx.restore();
    }

    // ---- Blinking start prompt ----
    const promptY = canvas.height * 0.88;
    const blink = 0.55 + Math.sin(time * 5) * 0.45;
    ctx.font = `bold ${Math.max(16, Math.min(canvas.width * 0.022, 30))}px "Courier New", monospace`;
    ctx.fillStyle = `rgba(255, 224, 130, ${blink})`;
    ctx.shadowColor = 'rgba(255, 200, 70, 0.7)';
    ctx.shadowBlur = 14;
    ctx.fillText(touchEnabled ? 'TAP A MODE TO LAUNCH' : 'CLICK A MODE OR PRESS SPACE', cx, promptY);
    ctx.shadowBlur = 0;

    // Flavor corners
    ctx.font = `${Math.max(11, Math.min(canvas.width * 0.014, 18))}px "Courier New", monospace`;
    ctx.fillStyle = 'rgba(120, 150, 200, 0.6)';
    ctx.textAlign = 'left';
    ctx.fillText('CREDIT 00', canvas.width * 0.04, canvas.height * 0.95);
    ctx.textAlign = 'right';
    ctx.fillText(touchEnabled ? 'TAP TO SELECT' : 'ESC TO GO BACK', canvas.width * 0.96, canvas.height * 0.95);
    ctx.textAlign = 'center';

    ctx.restore();

    // Full-screen scanline overlay
    drawArcadeScanlines(0.06);
}

// Draw
let frameCount = 0;
function draw() {
    frameCount++;
    const time = frameCount * 0.016;

    // Boss intro: re-render a cached overlay every other frame, then just blit it
    if (gameState === 'bossIntro') {
        const needsFreshBossIntroCache = !bossIntroFrameCache || bossIntroFrameCache.width !== canvas.width || bossIntroFrameCache.height !== canvas.height;
        if (needsFreshBossIntroCache) {
            bossIntroFrameCache = document.createElement('canvas');
            bossIntroFrameCache.width = canvas.width;
            bossIntroFrameCache.height = canvas.height;
        }

        if (needsFreshBossIntroCache || frameCount % 2 === 0) {
            const cacheCtx = bossIntroFrameCache.getContext('2d');
            cacheCtx.setTransform(1, 0, 0, 1, 0, 0);
            cacheCtx.globalAlpha = 1;
            cacheCtx.globalCompositeOperation = 'source-over';
            cacheCtx.fillStyle = '#000';
            cacheCtx.fillRect(0, 0, canvas.width, canvas.height);
            drawBossIntroOverlay(cacheCtx);
        }

        ctx.drawImage(bossIntroFrameCache, 0, 0);
        return;
    }

    if ((gameState === 'characterSelect' || gameState === 'title' || gameState === 'difficultySelect') && titleFrameCache && frameCount % 2 === 1) {
        ctx.drawImage(titleFrameCache, 0, 0);
        return;
    }

    if (bgCanvas) {
        ctx.drawImage(bgCanvas, 0, 0);
    } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    for (let i = 0; i < stars.length; i += 3) {
        const s = stars[i];
        const twinkle = 0.5 + Math.sin(frameCount * s.twinkleSpeed + i) * 0.5;
        const alpha = s.brightness * twinkle * 0.5;
        const starX = (gameState === 'characterSelect' || gameState === 'title' || gameState === 'difficultySelect') ? s.x + Math.sin(time * 0.1 + i) * 2 : s.x;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(starX, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    }

    if (gameState === 'characterSelect' || gameState === 'title' || gameState === 'difficultySelect') {
        if (gameState === 'characterSelect') {
            drawCharacterSelectScreen();
        } else {
        drawTitleScreen();
        if (levelSelectActive) {
            const levelEntries = getLevelSelectEntries();
            const selectedEntry = levelEntries[levelSelectChoice];
            const visibleEntries = 7;
            const startIndex = Math.max(0, Math.min(levelEntries.length - visibleEntries, levelSelectChoice - Math.floor(visibleEntries / 2)));
            const endIndex = Math.min(levelEntries.length, startIndex + visibleEntries);

            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 46px Impact, Haettenschweiler, "Arial Black", sans-serif';
            ctx.fillStyle = '#ffe066';
            ctx.fillText('LEVEL SELECT', canvas.width / 2, canvas.height * 0.14);

            for (let i = startIndex; i < endIndex; i++) {
                const entry = levelEntries[i];
                const offset = i - levelSelectChoice;
                const y = canvas.height * 0.46 + offset * 54;
                const isSelected = i === levelSelectChoice;
                ctx.globalAlpha = isSelected ? 1 : 0.45;
                ctx.font = isSelected
                    ? 'bold 54px Impact, Haettenschweiler, "Arial Black", sans-serif'
                    : 'bold 34px Impact, Haettenschweiler, "Arial Black", sans-serif';
                ctx.fillStyle = entry.type === 'boss' ? '#ff8aab' : '#ffffff';
                if (isSelected) {
                    ctx.shadowColor = entry.type === 'boss' ? 'rgba(255, 90, 130, 0.9)' : 'rgba(255, 255, 255, 0.8)';
                    ctx.shadowBlur = 22;
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.fillText(entry.label, canvas.width / 2, y);
            }

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            ctx.fillStyle = selectedEntry && selectedEntry.type === 'boss' ? '#ffd4de' : '#9fd2ff';
            ctx.font = '22px "Courier New", monospace';
            ctx.fillText(selectedEntry ? selectedEntry.detail : '', canvas.width / 2, canvas.height * 0.73);
            ctx.fillStyle = '#aaa';
            ctx.font = '18px "Courier New", monospace';
            ctx.fillText('↑/↓ choose • ENTER start • B jumps to boss from level 3/6/9... • ESC cancel', canvas.width / 2, canvas.height * 0.81);
            ctx.restore();
        } else if (gameState === 'difficultySelect') {
            drawDifficultySelectOverlay();
        }
        }
        if (!titleFrameCache || titleFrameCache.width !== canvas.width || titleFrameCache.height !== canvas.height) {
            titleFrameCache = document.createElement('canvas');
            titleFrameCache.width = canvas.width;
            titleFrameCache.height = canvas.height;
        }
        titleFrameCache.getContext('2d').drawImage(canvas, 0, 0);
        return;
    }

    const screenShakeActive = gameState !== 'bossIntro' && (screenShakeTimer > 0 || (shipExplosion && shipExplosion.life > 45));
    if (screenShakeActive) {
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
    }

    for (const p of particles) {
        const alpha = Math.min(1, p.life / 30);
        const size = p.size || 2;
        if (p.color && p.color !== '#fff') {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        } else {
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fillRect(p.x - 1, p.y - 1, size, size);
        }
    }

    drawPickups();
    drawAsteroidField(asteroids);
    drawEnemies();
    drawPulseWaves();

    for (const b of bullets) {
        ctx.save();
        ctx.shadowColor = '#ff3300';
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#ff3300';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    drawMissiles();
    drawLaserBeam();

    if (boss && (gameState === 'boss' || gameState === 'bossDefeated')) {
        drawBossEntity(boss, gameState === 'bossDefeated');
    }

    if (ship) {
        if (ship.invincible > 0 && Math.floor(ship.invincible / 6) % 2 === 0) {
        } else {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            if (ship.thrusting && Math.random() > 0.3) {
                ctx.shadowColor = '#ff6600';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.ellipse(-SHIP_IMG_WIDTH * 0.38 - Math.random() * 18, 0, 14 + Math.random() * 10, 7 + Math.random() * 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.ellipse(-SHIP_IMG_WIDTH * 0.38, 0, 9, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            const currentShipImg = ship.shootAnim > 0
                ? activeChar().shipShooting
                : activeChar().ship;
            ctx.drawImage(currentShipImg, -SHIP_IMG_WIDTH / 2 + SHIP_IMG_OFFSET_X, -SHIP_IMG_HEIGHT / 2, SHIP_IMG_WIDTH, SHIP_IMG_HEIGHT);
            ctx.restore();

            if (ship.shield) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = 0.3 + Math.sin(frameCount * 0.08) * 0.1;
                ctx.strokeStyle = '#44aaff';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#44aaff';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.radius + 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }
    }

    if (ejectedPug) {
        const alpha = Math.min(1, ejectedPug.life / 40);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(ejectedPug.x, ejectedPug.y);
        ctx.rotate(ejectedPug.rotation);
        const ejScale = activeChar().ejectedScale || 1;
        const ejW = PUG_EJECTED_WIDTH * ejScale;
        const ejH = PUG_EJECTED_HEIGHT * ejScale;
        ctx.drawImage(activeChar().ejected, -ejW / 2, -ejH / 2, ejW, ejH);
        ctx.restore();
    }

    drawExplosionBlast(shipExplosion);
    for (const explosion of enemyExplosions) {
        drawExplosionBlast(explosion);
    }

    ctx.fillStyle = '#fff';
    ctx.font = '20px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${score}`, 20, 35);
    drawSpecialWeaponHud();
    drawBossHud();

    ctx.textAlign = 'right';
    ctx.fillText(`HIGH: ${highScore}`, canvas.width - 20, 35);
    drawDifficultyBadge();

    for (let i = 0; i < lives; i++) {
        const lx = 30 + i * 35;
        const ly = 132;
        ctx.drawImage(activeChar().ship, lx - 15, ly - 10, 30, 21);
    }
    drawHitPointHud();

    ctx.textAlign = 'center';
    ctx.font = '14px monospace';
    ctx.fillText(`LEVEL ${level}`, canvas.width / 2, 25);

    if (levelTransitionActive && !shouldTriggerBossFight(level)) {
        const progress = 1 - (levelTransitionTimer / 150);
        const alpha = progress < 0.2 ? progress / 0.2 : progress > 0.8 ? (1 - progress) / 0.2 : 1;
        const transitionLabel = `LEVEL ${level + 1}`;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = 'bold 72px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffe066';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.strokeText(transitionLabel, canvas.width / 2, canvas.height / 2);
        ctx.fillText(transitionLabel, canvas.width / 2, canvas.height / 2);
        ctx.restore();
    }

    if (gameState === 'bossIntro') {
        drawBossIntroOverlay();
    }

    if (gameState === 'bossDefeated') {
        drawBossDefeatedOverlay();
    }

    if (gameOver) {
        ctx.textAlign = 'center';
        ctx.font = '48px monospace';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '20px monospace';
        ctx.fillText('Press ENTER or TAP to choose a hero', canvas.width / 2, canvas.height / 2 + 30);
        ctx.font = '16px monospace';
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 70);
    }

    if (screenShakeActive) {
        ctx.restore();
    }
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    if (shieldFlashTimer > 0) {
        ctx.save();
        ctx.fillStyle = `rgba(255, 255, 255, ${shieldFlashTimer / 10})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
    }

    if (paused && ['playing', 'boss', 'bossIntro', 'bossDefeated'].includes(gameState)) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const pausePortrait = activePortrait();
        if (pausePortrait.complete && pausePortrait.naturalWidth > 0) {
            const portraitSize = Math.min(canvas.height * 0.5, canvas.width * 0.35);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 - 20;
            const radius = portraitSize / 2;
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            ctx.globalAlpha = 0.3;
            const imgW = pausePortrait.naturalWidth;
            const imgH = pausePortrait.naturalHeight;
            const scale = Math.max(portraitSize / imgW, portraitSize / imgH) * 1.25;
            const drawW = imgW * scale;
            const drawH = imgH * scale;
            const anchor = activeChar().pausePortraitAnchor ?? 0.45;
            ctx.drawImage(pausePortrait, cx - drawW / 2, cy - drawH * anchor, drawW, drawH);
            ctx.restore();
            ctx.save();
            ctx.globalAlpha = 0.5;
            ctx.strokeStyle = '#6ee6ff';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#6ee6ff';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 2, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
        ctx.font = 'bold 64px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffe066';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText(activeChar().pauseLabel, canvas.width / 2, canvas.height / 2);
        ctx.fillText(activeChar().pauseLabel, canvas.width / 2, canvas.height / 2);
        ctx.font = '20px "Courier New", monospace';
        ctx.fillStyle = '#ccc';
        ctx.fillText(activeChar().pauseHint, canvas.width / 2, canvas.height / 2 + 50);
        ctx.restore();
    }
}

// Game loop
function loop() {
    update();
    draw();
    updateTouchUI();
    requestAnimationFrame(loop);
}

// ---- Touch controls ----
function byId(id) { return document.getElementById(id); }

let touchEnabled = false;
let releaseTouchKeys = function () {};
const TOUCH_GROUPS = {
    play: ['btnLeft', 'btnRight', 'btnThrust', 'btnFire', 'btnPause']
};
let lastTouchGroup = '__init__';

// Hit rects for canvas-drawn menu buttons, populated each frame by the draw
// functions. Menus are tapped/clicked directly on the canvas (no duplicate HTML
// buttons), so the same arcade artwork works for both mouse and touch.
let characterCardRects = [];
let difficultyCardRects = [];

function isPortraitBlocked() {
    // Only force-landscape on phone-sized touch screens — not desktop touch
    // monitors, Surface laptops, or tablets that merely have a coarse pointer.
    const phoneLike = Math.min(window.innerWidth, window.innerHeight) < 700;
    return touchEnabled && phoneLike && window.matchMedia &&
        window.matchMedia('(orientation: portrait)').matches;
}

(function setupTouchControls() {
    // Only treat this as a touch device when there's a coarse pointer (finger)
    // and NO fine pointer (mouse/trackpad). Desktops and touch-screen laptops
    // have a fine pointer, so they keep mouse/keyboard controls and never show
    // the on-screen buttons or the landscape gate.
    const mm = window.matchMedia;
    const hasFine = mm ? mm('(any-pointer: fine)').matches : false;
    const hasCoarse = mm ? mm('(any-pointer: coarse)').matches : false;
    const touchCapable = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    const isTouch = mm ? (hasCoarse && !hasFine) : touchCapable;
    const ui = byId('touchUI');
    if (!ui) return;
    if (!isTouch) { ui.style.display = 'none'; return; }
    touchEnabled = true;

    // Hold-style button: drives keys[] while pressed. Pointer capture keeps the
    // press bound to this button even if the finger drifts off it, and lets
    // several buttons be held at once (e.g. rotate + fire).
    function hold(el, code) {
        if (!el) return;
        const press = e => {
            e.preventDefault();
            try { el.setPointerCapture(e.pointerId); } catch (_) {}
            keys[code] = true; el.classList.add('active');
        };
        const release = e => { if (e) e.preventDefault(); keys[code] = false; el.classList.remove('active'); };
        el.addEventListener('pointerdown', press);
        el.addEventListener('pointerup', release);
        el.addEventListener('pointercancel', release);
        el.addEventListener('lostpointercapture', release);
    }

    // Tap-style button (gameplay pause only).
    function tap(el, fn) {
        if (!el) return;
        el.addEventListener('pointerdown', e => {
            e.preventDefault();
            try { el.setPointerCapture(e.pointerId); } catch (_) {}
            el.classList.add('active');
        });
        el.addEventListener('pointerup', e => { e.preventDefault(); el.classList.remove('active'); fn(); });
        el.addEventListener('pointercancel', e => { el.classList.remove('active'); });
    }

    function dispatchKey(code) {
        window.dispatchEvent(new KeyboardEvent('keydown', { code }));
        window.dispatchEvent(new KeyboardEvent('keyup', { code }));
    }

    hold(byId('btnLeft'), 'ArrowLeft');
    hold(byId('btnRight'), 'ArrowRight');
    hold(byId('btnThrust'), 'ArrowUp');
    hold(byId('btnFire'), 'Space');
    tap(byId('btnPause'), () => dispatchKey('KeyP'));

    releaseTouchKeys = function () {
        ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'Space'].forEach(c => { keys[c] = false; });
        ui.querySelectorAll('.tbtn, .tpill').forEach(b => b.classList.remove('active'));
    };
})();

// ---- Canvas menu interaction (mouse click + touch tap, unified) ----
(function setupMenuPointer() {
    let downX = 0, downY = 0, activePointerId = null;
    function pos(e) {
        const r = canvas.getBoundingClientRect();
        const sx = r.width ? canvas.width / r.width : 1;
        const sy = r.height ? canvas.height / r.height : 1;
        return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
    }
    function activeRects() {
        if (gameState === 'characterSelect') return characterCardRects;
        if (gameState === 'difficultySelect') return difficultyCardRects;
        return null;
    }
    canvas.addEventListener('pointerdown', e => {
        if (activePointerId !== null) return; // ignore extra fingers
        activePointerId = e.pointerId;
        const p = pos(e); downX = p.x; downY = p.y;
    });
    canvas.addEventListener('pointerup', e => {
        if (e.pointerId !== activePointerId) return;
        activePointerId = null;
        const p = pos(e);
        if (Math.hypot(p.x - downX, p.y - downY) > 26) return; // a drag, not a tap
        handleMenuTap(p.x, p.y);
    });
    canvas.addEventListener('pointercancel', e => {
        if (e.pointerId === activePointerId) activePointerId = null;
    });
    // Desktop affordance: mouse hover highlights the card under the cursor and
    // shows a pointer cursor, so the menus are clearly clickable (not touch-only).
    canvas.addEventListener('pointermove', e => {
        if (e.pointerType && e.pointerType !== 'mouse') return;
        if (isPortraitBlocked()) return;
        const rects = activeRects();
        if (!rects) { canvas.style.cursor = 'default'; return; }
        const p = pos(e);
        let over = false;
        for (const r of rects) {
            if (hitRect(p.x, p.y, r)) {
                over = true;
                if (gameState === 'characterSelect' && characterSelectChoice !== r.index) {
                    characterSelectChoice = r.index; titleFrameCache = null;
                } else if (gameState === 'difficultySelect' && difficultySelectChoice !== r.index) {
                    difficultySelectChoice = r.index; titleFrameCache = null;
                }
                break;
            }
        }
        canvas.style.cursor = over ? 'pointer' : 'default';
    });
    canvas.addEventListener('pointerleave', () => { canvas.style.cursor = 'default'; });
})();

function hitRect(x, y, r) {
    return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function handleMenuTap(x, y) {
    if (isPortraitBlocked()) return;
    if (gameState === 'gameover' || gameOver) {
        returnToCharacterSelectAfterGameOver();
        return;
    }
    if (gameState === 'characterSelect') {
        for (const r of characterCardRects) {
            if (hitRect(x, y, r)) {
                characterSelectChoice = r.index;
                applyCharacterSelection();
                gameState = 'title';
                titleFrameCache = null;
                playPickupSound();
                return;
            }
        }
    } else if (gameState === 'title' && !levelSelectActive) {
        startDifficultySelect();
    } else if (gameState === 'difficultySelect') {
        for (const r of difficultyCardRects) {
            if (hitRect(x, y, r)) {
                difficultySelectChoice = r.index;
                confirmDifficultySelection();
                return;
            }
        }
    }
}

function updateTouchUI() {
    if (!touchEnabled) return;
    let group = null;
    if (['playing', 'boss', 'bossIntro', 'bossDefeated'].includes(gameState) && !isPortraitBlocked()) {
        group = 'play';
    }

    if (group === lastTouchGroup) return;
    lastTouchGroup = group;

    Object.values(TOUCH_GROUPS).forEach(ids =>
        ids.forEach(id => { const el = byId(id); if (el) el.style.display = 'none'; })
    );
    releaseTouchKeys();
    if (group) {
        TOUCH_GROUPS[group].forEach(id => { const el = byId(id); if (el) el.style.display = 'flex'; });
    }
}

// ---- Auto-pause gameplay when the device is rotated to portrait ----
let pausedByPortrait = false;
function handleOrientationGate() {
    const blocked = isPortraitBlocked();
    const notice = byId('rotateNotice');
    if (notice) notice.classList.toggle('show', blocked);
    const inPlay = ['playing', 'boss', 'bossIntro', 'bossDefeated'].includes(gameState);
    if (blocked && inPlay && !paused) {
        paused = true;
        pausedByPortrait = true;
        if (currentMusic) currentMusic.pause();
        if (typeof stopThruster === 'function') stopThruster();
        if (typeof stopLaserHum === 'function') stopLaserHum();
    } else if (!blocked && pausedByPortrait) {
        // Only auto-resume if the rotate gate is what paused the game.
        pausedByPortrait = false;
        if (inPlay && paused) {
            paused = false;
            if (currentMusic) { currentMusic.play().catch(() => {}); }
        }
    }
    lastTouchGroup = '__force__';
    updateTouchUI();
}
window.addEventListener('orientationchange', handleOrientationGate);
window.addEventListener('resize', handleOrientationGate);
handleOrientationGate();

loop();
</script>
