        scheduleNextPickupSpawn();
    }

    if (!ship) {
        if (shipExplosion) {
            shipExplosion.life--;
            if (shipExplosion.life <= 0) {
                shipExplosion = null;
            }
        }
        if (ejectedPug) {
            ejectedPug.x += ejectedPug.dx;
            ejectedPug.y += ejectedPug.dy;
            ejectedPug.rotation += ejectedPug.rotSpeed;
            if (!shipExplosion) {
                ejectedPug.life--;
                if (ejectedPug.life <= 0) {
                    ejectedPug = null;
                    respawnTimer = 60;
                }
            }
        } else if (respawnTimer > 0) {
            respawnTimer--;
            if (respawnTimer <= 0 && lives > 0) {
                ship = createShip(true);
                switchMusic(gameMusic);
            }
        }
        updateAsteroids();
        updateEnemies();
        updateBullets();
        updateEnemyBullets();
        if (gameState === 'boss') updateBoss();
        updatePickups();
        updatePulseWaves();
        updateMissiles();
        updateParticles();
        updateEnemyExplosions();
        stopThruster();
        prevFirePressed = firePressed;
        return;
    }

    if (keys['ArrowLeft'] || keys['KeyA']) ship.angle -= TURN_SPEED;
    if (keys['ArrowRight'] || keys['KeyD']) ship.angle += TURN_SPEED;

    ship.thrusting = keys['ArrowUp'] || keys['KeyW'];
    if (ship.thrusting) {
        startThruster();
        ship.dx += Math.cos(ship.angle) * THRUST;
        ship.dy += Math.sin(ship.angle) * THRUST;
    } else {
        stopThruster();
    }

    ship.dx *= FRICTION;
    ship.dy *= FRICTION;
    ship.x += ship.dx;
    ship.y += ship.dy;
    wrap(ship);

    if (ship.invincible > 0) ship.invincible--;
    if (ship.shootCooldown > 0) ship.shootCooldown--;
    if (ship.shootAnim > 0) ship.shootAnim--;
    if (ship.hitFlash > 0) ship.hitFlash--;

    updatePickups();
    handlePickupCollection(ship);

    const weapon = ship.specialWeapon;
    const justPressedFire = firePressed && !prevFirePressed;

    if (weapon && weapon.type === 'laser') {
        updateLaserBeam(ship, firePressed);
    } else {
        laserBeam = null;
        stopLaserHum();

        if (weapon && weapon.type === 'pulse' && justPressedFire && weapon.ammo > 0) {
            pulseWaves.push(createPulseWave(ship));
            weapon.ammo--;
            ship.shootAnim = 12;
            playPulseSound();
            if (weapon.ammo <= 0) {
                ship.specialWeapon = createSpecialWeapon();
            }
        } else if (weapon && weapon.type === 'homing' && justPressedFire && weapon.ammo > 0) {
            missiles.push(createHomingMissile(ship));
            weapon.ammo--;
            ship.shootAnim = 12;
            playMissileSound();
            if (weapon.ammo <= 0) {
                ship.specialWeapon = createSpecialWeapon();
            }
        } else if ((!weapon || weapon.type === null) && firePressed && ship.shootCooldown <= 0 && bullets.length < MAX_BULLETS) {
            bullets.push(createBullet(ship));
            ship.shootCooldown = SHOOT_COOLDOWN;
            ship.shootAnim = 12;
            playBulletSound();
        }
    }

    updateBullets();
    updateAsteroids();
    if (enemiesRemaining > 0) {
        enemySpawnTimer--;
        if (enemySpawnTimer <= 0) {
            enemies.push(createEnemy());
            enemiesRemaining--;
            enemySpawnTimer = 180 + Math.floor(Math.random() * 300);
        }
    }
    if (redEnemiesRemaining > 0) {
        redEnemySpawnTimer--;
        if (redEnemySpawnTimer <= 0) {
            enemies.push(createRedEnemy());
            redEnemiesRemaining--;
            redEnemySpawnTimer = 150 + Math.floor(Math.random() * 211);
        }
    }
    updateEnemies();
    updateEnemyBullets();
    if (gameState === 'boss') updateBoss();
    updatePulseWaves();
    updateMissiles();
    updateParticles();
    updateEnemyExplosions();
    handleBulletAsteroidCollisions();

    if (ship.invincible <= 0) {
        const hitByEnemyBullet = handleEnemyBulletShipCollisions();
        if (!hitByEnemyBullet) {
            for (let j = asteroids.length - 1; j >= 0; j--) {
                if (dist(ship.x, ship.y, asteroids[j].x, asteroids[j].y) < ship.radius + asteroids[j].radius * 0.7) {
                    if (!absorbShieldHit(ship.x, ship.y)) {
                        damagePlayerShip(ship.x, ship.y);
                    }
                    break;
                }
            }
        }

        if (!hitByEnemyBullet && ship && boss && gameState === 'boss' && !boss.isAngry && dist(ship.x, ship.y, boss.x, boss.y) < ship.radius * 0.7 + boss.radius) {
            if (absorbShieldHit(ship.x, ship.y)) {
                const angle = Math.atan2(boss.y - ship.y, boss.x - ship.x);
                boss.pushBackVx += Math.cos(angle) * 2.2;
                boss.pushBackVy += Math.sin(angle) * 2.2;
            } else {
                damagePlayerShip(ship.x, ship.y);
            }
        }
    }

    if (gameState === 'playing' && asteroids.length === 0 && enemies.length === 0 && enemiesRemaining <= 0 && redEnemiesRemaining <= 0 && levelTransitionTimer <= 0 && !levelTransitionActive) {
        levelTransitionActive = true;
        levelTransitionTimer = 150;
        switchMusic(null);
        playLevelCompleteSound();
    }
    if (levelTransitionActive) {
        levelTransitionTimer--;
        if (levelTransitionTimer <= 0) {
            levelTransitionActive = false;
            if (shouldTriggerBossFight(level)) {
                startBossIntro();
            } else {
                nextLevel();
                switchMusic(gameMusic);
            }
        }
    }

    prevFirePressed = firePressed;
}

function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].dx;
        bullets[i].y += bullets[i].dy;
        bullets[i].life--;
        // Wrap bullets
        if (bullets[i].x < 0) bullets[i].x = canvas.width;
        if (bullets[i].x > canvas.width) bullets[i].x = 0;
        if (bullets[i].y < 0) bullets[i].y = canvas.height;
        if (bullets[i].y > canvas.height) bullets[i].y = 0;
        if (bullets[i].life <= 0) bullets.splice(i, 1);
    }
}

function updateAsteroids() {
    for (const a of asteroids) {
        a.x += a.dx;
        a.y += a.dy;
        a.angle += a.rotSpeed;
        wrap(a);
    }
}

function updateEnemies() {
    for (const enemy of enemies) {
        const heading = Math.atan2(enemy.dy, enemy.dx);
        const wobble = Math.sin(enemy.wobblePhase) * 0.5;
        enemy.x += enemy.dx + Math.cos(heading + Math.PI / 2) * wobble;
        enemy.y += enemy.dy + Math.sin(heading + Math.PI / 2) * wobble;
        enemy.wobblePhase += enemy.wobbleSpeed;
        enemy.rotWobble = Math.sin(enemy.wobblePhase * 0.7) * 0.09;
        enemy.dirChangeTimer--;

        if (enemy.dirChangeTimer <= 0) {
            const speed = Math.hypot(enemy.dx, enemy.dy);
            let newAngle = heading + (Math.random() - 0.5) * (enemy.type === 'red' ? 0.6 : 0.9);
            if (enemy.type === 'red' && ship && Math.random() < 0.3) {
                newAngle = Math.atan2(ship.y - enemy.y, ship.x - enemy.x) + (Math.random() - 0.5) * 0.25;
            }
            enemy.dx = Math.cos(newAngle) * speed;
            enemy.dy = Math.sin(newAngle) * speed;
            enemy.dirChangeTimer = enemy.type === 'red'
                ? 90 + Math.floor(Math.random() * 150)
                : 120 + Math.floor(Math.random() * 180);
        }

        if (ship) {
            enemy.shootTimer--;
            if (enemy.shootTimer <= 0) {
                const targetPoint = enemy.type === 'red'
                    ? { x: ship.x + ship.dx * 20, y: ship.y + ship.dy * 20 }
                    : ship;
                enemyBullets.push(createEnemyBullet(enemy, ship, targetPoint));
                enemy.shootTimer = enemy.type === 'red'
                    ? 90 + Math.floor(Math.random() * 91)
                    : 180 + Math.floor(Math.random() * 121);
                playEnemyShootSound();
            }
        }

        for (let i = 0; i < enemy.lightPhases.length; i++) {
            enemy.lightPhases[i] += enemy.lightSpeeds[i];
        }

        wrap(enemy);
    }
}

function updateEnemyBullets() {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        bullet.x += bullet.dx;
        bullet.y += bullet.dy;
        bullet.life--;
        wrap(bullet);
        if (bullet.life <= 0) enemyBullets.splice(i, 1);
    }
}

function updateParticles() {
    // Cap particles to prevent performance issues
    if (particles.length > 500) particles.splice(0, particles.length - 500);
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].dx;
        particles[i].y += particles[i].dy;
        particles[i].dx *= 0.97;
        particles[i].dy *= 0.97;
        particles[i].life--;
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
}

function updateEnemyExplosions() {
    for (let i = enemyExplosions.length - 1; i >= 0; i--) {
        enemyExplosions[i].life--;
        if (enemyExplosions[i].life <= 0) {
            enemyExplosions.splice(i, 1);
        }
    }
}

function getWeaponPalette(type) {
    if (type === 'laser') return { primary: '#66e6ff', secondary: '#d7fbff' };
    if (type === 'pulse') return { primary: '#9a7dff', secondary: '#66d9ff' };
    if (type === 'homing') return { primary: '#ff7b39', secondary: '#ffd16b' };
    if (type === 'shield') return { primary: '#44aaff', secondary: '#2266cc' };
    return { primary: '#8aa0bf', secondary: '#d9e6ff' };
}

function drawWeaponIcon(type, x, y, scale = 1, rotation = 0, alpha = 1) {
    if (!type) return;

    const palette = getWeaponPalette(type);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = palette.primary;
    ctx.fillStyle = palette.secondary;
    ctx.lineWidth = 2 * scale;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.shadowColor = palette.primary;
    ctx.shadowBlur = 12 * scale;

    if (type === 'laser') {
        ctx.beginPath();
        ctx.arc(-8 * scale, 0, 4 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-2 * scale, 0);
        ctx.lineTo(12 * scale, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(4 * scale, -4 * scale);
        ctx.lineTo(12 * scale, -4 * scale);
        ctx.moveTo(4 * scale, 4 * scale);
        ctx.lineTo(12 * scale, 4 * scale);
        ctx.stroke();
    } else if (type === 'pulse') {
        ctx.beginPath();
        ctx.arc(0, 0, 5 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, 0, 10 * scale, Math.PI * 0.15, Math.PI * 1.85);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, 15 * scale, Math.PI * 0.45, Math.PI * 1.55);
        ctx.stroke();
    } else if (type === 'homing') {
        ctx.beginPath();
        ctx.moveTo(10 * scale, 0);
        ctx.lineTo(-4 * scale, -5 * scale);
        ctx.lineTo(-8 * scale, -3 * scale);
        ctx.lineTo(-8 * scale, 3 * scale);
        ctx.lineTo(-4 * scale, 5 * scale);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ff4d2a';
        ctx.beginPath();
        ctx.moveTo(-8 * scale, 0);
        ctx.lineTo(-14 * scale, -3 * scale);
        ctx.lineTo(-14 * scale, 3 * scale);
        ctx.closePath();
        ctx.fill();
    } else if (type === 'shield') {
        ctx.beginPath();
        ctx.moveTo(0, -12 * scale);
        ctx.bezierCurveTo(10 * scale, -12 * scale, 12 * scale, -5 * scale, 10 * scale, 2 * scale);
        ctx.bezierCurveTo(8 * scale, 9 * scale, 4 * scale, 14 * scale, 0, 18 * scale);
        ctx.bezierCurveTo(-4 * scale, 14 * scale, -8 * scale, 9 * scale, -10 * scale, 2 * scale);
        ctx.bezierCurveTo(-12 * scale, -5 * scale, -10 * scale, -12 * scale, 0, -12 * scale);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = '#bfe6ff';
        ctx.lineWidth = 1.4 * scale;
        ctx.beginPath();
        ctx.moveTo(0, -8 * scale);
        ctx.lineTo(0, 12 * scale);
        ctx.moveTo(-5 * scale, -2 * scale);
        ctx.lineTo(5 * scale, -2 * scale);
        ctx.stroke();
    }

    ctx.restore();
}

function drawPickups() {
    for (const pickup of pickups) {
        const palette = getWeaponPalette(pickup.type);
        // Blink faster as pickup is about to expire (last 3 seconds = 180 frames)
        let alpha = 1;
        if (pickup.life < 180) {
            const urgency = 1 - (pickup.life / 180); // 0→1 as time runs out
            const blinkRate = 4 + urgency * 20; // blinks per second accelerates
            const blink = Math.sin(frameCount * blinkRate * 0.1) > 0 ? 1 : 0.15;
            alpha = blink * (0.4 + urgency * 0.2 + (1 - urgency) * 0.6);
        }
        const bob = Math.sin(frameCount * 0.08 + pickup.x * 0.02) * 4;

        ctx.save();
        ctx.translate(pickup.x, pickup.y + bob);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(10, 16, 30, 0.82)';
        ctx.beginPath();
        ctx.arc(0, 0, pickup.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = palette.primary;
        ctx.lineWidth = 2;
        ctx.shadowColor = palette.primary;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(0, 0, pickup.radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.rotate(pickup.angle);
        ctx.strokeRect(-pickup.radius * 0.72, -pickup.radius * 0.72, pickup.radius * 1.44, pickup.radius * 1.44);
        ctx.restore();

        drawWeaponIcon(pickup.type, pickup.x, pickup.y + bob, 0.95, pickup.angle * 0.6, alpha);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#ffffff';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(pickup.label, pickup.x, pickup.y - pickup.radius - 12 + bob);
        ctx.restore();
    }
}

function drawPulseWaves() {
    for (const wave of pulseWaves) {
        const alpha = Math.max(0, 1 - wave.radius / wave.maxRadius);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = alpha > 0.5 ? '#66d9ff' : '#9a7dff';
        ctx.lineWidth = 6;
        ctx.shadowColor = '#66d9ff';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = alpha * 0.7;
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(wave.x, wave.y, Math.max(0, wave.radius - 10), 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }
}

function drawMissiles() {
    for (const missile of missiles) {
        ctx.save();
        ctx.translate(missile.x, missile.y);
        ctx.rotate(missile.angle);

        ctx.fillStyle = '#ffcf66';
        ctx.beginPath();
        ctx.moveTo(-9, 0);
        ctx.lineTo(-16, -4);
        ctx.lineTo(-16, 4);
        ctx.closePath();
        ctx.fill();

        ctx.shadowColor = '#ff7b39';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ff7b39';
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(-2, -5);
        ctx.lineTo(-8, -4);
        ctx.lineTo(-8, 4);
        ctx.lineTo(-2, 5);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffe9b0';
        ctx.fillRect(-1, -2, 5, 4);
        ctx.restore();
    }
}

function drawLaserBeam() {
    if (!laserBeam) return;

    const gradient = ctx.createLinearGradient(laserBeam.x1, laserBeam.y1, laserBeam.x2, laserBeam.y2);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
    gradient.addColorStop(0.15, 'rgba(160, 250, 255, 0.95)');
    gradient.addColorStop(1, 'rgba(80, 220, 255, 0.6)');

    ctx.save();
    ctx.strokeStyle = 'rgba(102, 230, 255, 0.28)';
    ctx.lineWidth = 18 * laserBeam.flicker;
    ctx.shadowColor = '#66e6ff';
    ctx.shadowBlur = 24;
    ctx.beginPath();
    ctx.moveTo(laserBeam.x1, laserBeam.y1);
    ctx.lineTo(laserBeam.x2, laserBeam.y2);
    ctx.stroke();

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 8 * laserBeam.flicker;
    ctx.beginPath();
    ctx.moveTo(laserBeam.x1, laserBeam.y1);
    ctx.lineTo(laserBeam.x2, laserBeam.y2);
    ctx.stroke();

    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(laserBeam.x1, laserBeam.y1);
    ctx.lineTo(laserBeam.x2, laserBeam.y2);
    ctx.stroke();
    ctx.restore();
}

function drawSpecialWeaponHud() {
    const weapon = ship ? ship.specialWeapon : null;
    const type = weapon ? weapon.type : null;
    if (!type) return;
    const panelX = 20;
    const panelY = 52;
    const panelWidth = 230;
    const panelHeight = 58;
    ctx.save();
    ctx.fillStyle = 'rgba(5, 10, 22, 0.72)';
    ctx.strokeStyle = 'rgba(120, 180, 255, 0.35)';
    ctx.lineWidth = 2;
    ctx.fillRect(panelX, panelY, panelWidth, panelHeight);
    ctx.strokeRect(panelX, panelY, panelWidth, panelHeight);

    ctx.fillStyle = '#9fb4d9';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SPECIAL', panelX + 12, panelY + 16);

    if (type) {
        drawWeaponIcon(type, panelX + 28, panelY + 36, 0.8, frameCount * 0.05, 1);
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px monospace';
        ctx.fillText(type.toUpperCase(), panelX + 48, panelY + 34);
        ctx.font = '13px monospace';

        if (type === 'laser') {
            const energyRatio = Math.max(0, Math.min(1, weapon.energy / LASER_ENERGY_MAX));
            const easyMult = difficulty === 'easy' ? 2 : 1;
            const totalRatio = Math.max(0, Math.min(1, weapon.ammo / (LASER_TOTAL_AMMO * easyMult)));
            ctx.fillText(`${(weapon.ammo / 60).toFixed(1)}s`, panelX + 48, panelY + 52);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fillRect(panelX + 148, panelY + 24, 68, 12);
            ctx.fillStyle = 'rgba(80, 148, 255, 0.4)';
            ctx.fillRect(panelX + 148, panelY + 24, 68 * totalRatio, 12);
            ctx.fillStyle = '#66e6ff';
            ctx.fillRect(panelX + 148, panelY + 27, 68 * energyRatio, 6);
            ctx.strokeStyle = 'rgba(215, 251, 255, 0.85)';
            ctx.strokeRect(panelX + 148, panelY + 24, 68, 12);
        } else {
            ctx.fillText(`${weapon.ammo} shots`, panelX + 48, panelY + 52);
        }
    } else {
        ctx.fillStyle = '#8aa0bf';
        ctx.font = '16px monospace';
        ctx.fillText('NONE', panelX + 48, panelY + 34);
        ctx.font = '12px monospace';
        ctx.fillText('Collect glowing pickups', panelX + 48, panelY + 52);
    }

    ctx.restore();
}

function drawDifficultyBadge() {
    ctx.save();
    ctx.textAlign = 'right';
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = difficulty === 'easy' ? '#7dffb3' : '#ff8fa6';
    ctx.fillText(difficulty.toUpperCase(), canvas.width - 20, 56);
    ctx.restore();
}

function drawHitPointHud() {
    if (difficulty !== 'easy') return;

    const hp = ship ? ship.hitPoints : 0;
    const flashing = hpFlashTimer > 0 && Math.floor(hpFlashTimer / 4) % 2 === 0;
    const baseX = 20;
    const baseY = 156;

    ctx.save();
    ctx.textAlign = 'left';
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = flashing ? '#ff5566' : '#ffd6dd';
    ctx.fillText(`HP: ${ship ? ship.hitPoints : '--'}`, baseX, baseY);

    for (let i = 0; i < 2; i++) {
        const active = i < hp;
        const pipX = baseX + 56 + i * 18;
        const pipY = baseY - 12;
        ctx.fillStyle = active ? (flashing ? '#ff4458' : '#ff7f96') : 'rgba(255, 255, 255, 0.12)';
        ctx.strokeStyle = active ? 'rgba(255, 235, 240, 0.95)' : 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 1.5;
        ctx.fillRect(pipX, pipY, 12, 12);
        ctx.strokeRect(pipX, pipY, 12, 12);
    }
    ctx.restore();
}

function drawAsteroidField(asteroidField, strokeStyle = '#fff', lineWidth = 1.5, alpha = 1) {
    ctx.save();
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = lineWidth;
    ctx.globalAlpha = alpha;
    for (const asteroid of asteroidField) {
        ctx.save();
        ctx.translate(asteroid.x, asteroid.y);
        ctx.rotate(asteroid.angle);
        ctx.beginPath();
        for (let i = 0; i < ASTEROID_VERTICES; i++) {
            const angle = (i / ASTEROID_VERTICES) * Math.PI * 2;
            const r = asteroid.radius * asteroid.vertices[i];
            if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
            else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }
    ctx.restore();
}

function drawEnemies() {
    const greenLightOffsets = [
        { x: -34, y: -14, color: '#44ff44' },
        { x: 32, y: -12, color: '#cc44ff' },
        { x: -26, y: 14, color: '#cc44ff' },
        { x: 24, y: 16, color: '#44ff44' }
    ];
    const redLightOffsets = [
        { x: -45, y: -10, color: '#ff2222' },
        { x: 45, y: -10, color: '#ff6600' },
        { x: -35, y: 12, color: '#ff6600' },
        { x: 35, y: 12, color: '#ff2222' },
        { x: 0, y: -18, color: '#ff6600' }
    ];

    for (const enemy of enemies) {
        const isRedEnemy = enemy.type === 'red';
        const lightOffsets = isRedEnemy ? redLightOffsets : greenLightOffsets;
        const image = isRedEnemy ? enemyShipRedImg : enemyShipImg;
        const width = isRedEnemy ? RED_ENEMY_WIDTH : ENEMY_WIDTH;
        const height = isRedEnemy ? RED_ENEMY_HEIGHT : ENEMY_HEIGHT;

        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        ctx.rotate(enemy.rotWobble);
        ctx.drawImage(image, -width / 2, -height / 2, width, height);

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (let i = 0; i < lightOffsets.length; i++) {
            const light = lightOffsets[i];
            const pulse = 0.25 + (Math.sin(enemy.lightPhases[i]) + 1) * 0.35;
            ctx.fillStyle = light.color;
            ctx.globalAlpha = pulse * 0.25;
            ctx.beginPath();
            ctx.arc(light.x, light.y, 4 + pulse * 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 0.5 + pulse * 0.3;
            ctx.beginPath();
            ctx.arc(light.x, light.y, 1.8 + pulse * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
        ctx.restore();
    }

    for (const bullet of enemyBullets) {
        const isRedBullet = bullet.type === 'red' || bullet.color === 'red';
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = isRedBullet ? '#ff5522' : '#44ff88';
        ctx.globalAlpha = 0.35;
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius + 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.95;
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = isRedBullet ? '#ffd2a8' : '#cffff0';
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function getBossFrameSprite(bossObj, defeated = false) {
    if (defeated) return bossDefeatedImg;
    if (bossObj.isAngry) return bossAngryImg;
    const frameSequence = [bossFrame1, bossFrame2, bossFrame3, bossFrame3, bossFrame2, bossFrame1, bossFrame1, bossFrame2];
    return frameSequence[bossObj.frameIndex % frameSequence.length];
}

function drawBossPupils(bossObj, targetX, targetY, rotation = 0) {
    const localDx = Math.cos(-rotation) * (targetX - bossObj.x) - Math.sin(-rotation) * (targetY - bossObj.y);
    const localDy = Math.sin(-rotation) * (targetX - bossObj.x) + Math.cos(-rotation) * (targetY - bossObj.y);
    const eyeCenters = [
        { x: -bossObj.width * 0.045, y: -bossObj.height * 0.22 },
        { x: bossObj.width * 0.045, y: -bossObj.height * 0.22 }
    ];
    const pupilRadius = clamp(bossObj.width * 0.012, 5, 8);
    const travelX = bossObj.width * 0.016;
    const travelY = bossObj.height * 0.014;
    const lookLength = Math.hypot(localDx, localDy) || 1;
    const lookX = (localDx / lookLength) * travelX;
    const lookY = (localDy / lookLength) * travelY;

    ctx.save();
    for (const eye of eyeCenters) {
        const pupilX = eye.x + clamp(lookX, -travelX, travelX);
        const pupilY = eye.y + clamp(lookY, -travelY, travelY);
        ctx.fillStyle = '#2a2a35';
        ctx.beginPath();
        ctx.arc(pupilX, pupilY, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
        ctx.beginPath();
        ctx.arc(pupilX - pupilRadius * 0.28, pupilY - pupilRadius * 0.28, pupilRadius * 0.28, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawBossEntity(bossObj, defeated = false) {
    if (!bossObj) return;

    const sprite = getBossFrameSprite(bossObj, defeated);
    const phaseDamageRatio = defeated ? 1 : 1 - clamp(bossObj.phaseHp / Math.max(1, bossObj.phaseMaxHp), 0, 1);
    const wobbleRotation = defeated
        ? Math.sin(frameCount * 0.07) * 0.02
        : bossObj.isAngry
            ? Math.sin(frameCount * 0.45) * 0.08
            : Math.sin(bossObj.wobblePhase) * 0.055;
    const glowR = Math.round(255);
    const glowG = Math.round(110 - phaseDamageRatio * 78);
    const glowB = Math.round(180 - phaseDamageRatio * 130);
    const glowAlpha = defeated ? 0.38 : 0.2 + phaseDamageRatio * 0.5 + (bossObj.isAngry ? 0.16 : 0);
    const shadowBlur = defeated
        ? 12
        : Math.min(bossObj.isAngry ? 20 : 15, 8 + phaseDamageRatio * 5 + (bossObj.isAngry ? 5 : 0));
    const flashAlpha = bossObj.hitFlash > 0 ? clamp(bossObj.hitFlash / 7, 0, 1) * 0.55 : 0;
    const alpha = defeated
        ? (bossDefeatedTimer > 210 ? 1 : bossDefeatedTimer > 90 ? (bossDefeatedTimer - 90) / 120 : 0)
        : 1;
    const drawX = bossObj.x;
    const drawY = bossObj.y + (defeated ? Math.sin(frameCount * 0.08) * 4 : 0);
    const renderShake = bossObj.isAngry ? 12 : 0;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(drawX + (renderShake ? (Math.random() - 0.5) * renderShake : 0), drawY + (renderShake ? (Math.random() - 0.5) * renderShake : 0));
    ctx.rotate(wobbleRotation);
    const drawScale = bossObj.isAngry ? (bossObj.angerScale || 1) : 1;
    ctx.scale(drawScale, drawScale);

    if (sprite && sprite.complete && sprite.naturalWidth > 0) {
        // Draw boss sprite — no shadowBlur here (causes white box with source-atop)
        ctx.drawImage(sprite, -bossObj.width / 2, -bossObj.height / 2, bossObj.width, bossObj.height);

        // Damage tint and hit flash via offscreen canvas to avoid white box
        if ((!defeated && phaseDamageRatio > 0.05) || flashAlpha > 0 || bossObj.isAngry) {
            if (!bossObj._tintCanvas || bossObj._tintCanvas.width !== bossObj.width || bossObj._tintCanvas.height !== bossObj.height) {
                bossObj._tintCanvas = document.createElement('canvas');
                bossObj._tintCanvas.width = bossObj.width;
                bossObj._tintCanvas.height = bossObj.height;
            }
            const tintCanvas = bossObj._tintCanvas;
            const tCtx = tintCanvas.getContext('2d');
            tCtx.clearRect(0, 0, bossObj.width, bossObj.height);
            tCtx.drawImage(sprite, 0, 0, bossObj.width, bossObj.height);
            tCtx.globalCompositeOperation = 'source-atop';
            if (!defeated) {
                const tintAlpha = bossObj.isAngry
                    ? 0.16 + Math.sin(frameCount * 0.3) * 0.08
                    : 0.08 + phaseDamageRatio * 0.2;
                const tintG = Math.round(130 - phaseDamageRatio * 55);
                const tintB = Math.round(190 - phaseDamageRatio * 90);
                tCtx.fillStyle = bossObj.isAngry
                    ? `rgba(255, 70, 95, ${tintAlpha})`
                    : `rgba(255, ${tintG}, ${tintB}, ${tintAlpha})`;
                tCtx.fillRect(0, 0, bossObj.width, bossObj.height);
            }
            if (flashAlpha > 0) {
                tCtx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                tCtx.fillRect(0, 0, bossObj.width, bossObj.height);
            }
            ctx.drawImage(tintCanvas, -bossObj.width / 2, -bossObj.height / 2);
        }

        // Damage glow (draw a soft colored circle behind, not shadowBlur on sprite)
        if (!defeated && phaseDamageRatio > 0.1) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = glowAlpha * 0.4;
            const glowGrad = ctx.createRadialGradient(0, 0, bossObj.radius * 0.3, 0, 0, bossObj.radius * 1.1);
            glowGrad.addColorStop(0, `rgba(${glowR}, ${glowG}, ${glowB}, 0.5)`);
            glowGrad.addColorStop(1, 'rgba(255, 100, 150, 0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(0, 0, bossObj.radius * 1.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    } else {
        ctx.fillStyle = defeated ? '#f6b5cf' : '#e6c3d1';
        ctx.beginPath();
        ctx.ellipse(0, 0, bossObj.width * 0.42, bossObj.height * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    if (!defeated && !bossObj.isAngry) {
        drawBossPupils(
            bossObj,
            ship ? ship.x : bossObj.x - bossObj.width * 0.4,
            ship ? ship.y : bossObj.y,
            wobbleRotation
        );
    }

    ctx.restore();
}

let bossPortraitCache = null;
let bossPortraitCacheW = 0;
let bossPortraitCacheH = 0;

function drawBossIntroOverlay(targetCtx = ctx) {
    const introDuration = 210;
    const progress = clamp(1 - bossIntroTimer / introDuration, 0, 1);
    const portraitSide = 1;
    const portraitHeight = Math.round(canvas.height * 0.66);
    const portraitWidth = Math.round(portraitHeight * (1688 / 1125));
    const portraitTargetX = Math.round(canvas.width * (portraitSide < 0 ? 0.34 : 0.66));
    const portraitStartX = portraitSide < 0 ? Math.round(-portraitWidth * 0.45) : Math.round(canvas.width + portraitWidth * 0.45);
    const portraitEase = 1 - Math.pow(1 - clamp(progress * 1.2, 0, 1), 3);
    const portraitCenterX = Math.round(portraitStartX + (portraitTargetX - portraitStartX) * portraitEase);
    const portraitY = Math.round(canvas.height * 0.5 - portraitHeight / 2);
    const textProgress = clamp((progress - 0.18) / 0.22, 0, 1);
    const textEase = 1 - Math.pow(1 - textProgress, 3);
    const textScale = 1.7 - textEase * 0.7 + (textProgress >= 1 ? Math.sin(frameCount * 0.18) * 0.03 : 0);
    const textImpactShake = textProgress > 0 && textProgress < 0.22 ? (1 - textProgress / 0.22) * 18 : 0;
    const shakeX = Math.round(Math.sin(frameCount * 0.9) * textImpactShake * 0.35);
    const shakeY = Math.round(Math.cos(frameCount * 1.1) * textImpactShake * 0.35);
    const textX = Math.round(canvas.width / 2 + (portraitSide < 0 ? 1 : -1) * (1 - textEase) * canvas.width * 0.38);
    const textY = Math.round(canvas.height * 0.52);
    const flashAlpha = 0.12 + Math.max(0, Math.sin(progress * 20)) * 0.18;

    targetCtx.save();

    targetCtx.fillStyle = `rgba(255, 40, 70, ${flashAlpha})`;
    targetCtx.fillRect(0, 0, canvas.width, canvas.height);

    targetCtx.save();
    targetCtx.translate(Math.round(canvas.width / 2), Math.round(canvas.height / 2));
    targetCtx.rotate(portraitSide < 0 ? -0.12 : 0.12);
    for (let i = -7; i <= 7; i++) {
        const y = Math.round(i * 42 + (frameCount * 18 % 42));
        targetCtx.fillStyle = `rgba(255, 255, 255, ${0.03 + (i % 2 === 0 ? 0.04 : 0.02)})`;
        targetCtx.fillRect(-canvas.width, y, canvas.width * 2, 8);
    }
    targetCtx.restore();

    if (bossPortraitImg.complete && bossPortraitImg.naturalWidth > 0) {
        if (!bossPortraitCache || bossPortraitCacheW !== portraitWidth || bossPortraitCacheH !== portraitHeight) {
            bossPortraitCache = document.createElement('canvas');
            bossPortraitCache.width = portraitWidth;
            bossPortraitCache.height = portraitHeight;
            const portraitCtx = bossPortraitCache.getContext('2d');
            portraitCtx.clearRect(0, 0, portraitWidth, portraitHeight);
            portraitCtx.drawImage(bossPortraitImg, 0, 0, portraitWidth, portraitHeight);
            bossPortraitCacheW = portraitWidth;
            bossPortraitCacheH = portraitHeight;
        }
        targetCtx.drawImage(bossPortraitCache, portraitCenterX - Math.round(portraitWidth / 2), portraitY);
    }

    targetCtx.save();
    targetCtx.translate(textX + shakeX, textY + shakeY);
    targetCtx.scale(textScale, textScale);
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';
    targetCtx.lineJoin = 'round';
    targetCtx.strokeStyle = '#120208';
    targetCtx.lineWidth = 6;
    targetCtx.fillStyle = '#fff5f8';
    targetCtx.shadowColor = 'rgba(255, 65, 95, 0.95)';
    targetCtx.shadowBlur = 28;
    targetCtx.font = 'bold 46px Impact, Haettenschweiler, "Arial Black", sans-serif';
    targetCtx.strokeText('A CHALLENGER', 0, -30);
    targetCtx.fillText('A CHALLENGER', 0, -30);
    targetCtx.font = 'bold 72px Impact, Haettenschweiler, "Arial Black", sans-serif';
    targetCtx.strokeText('APPROACHES', 0, 38);
    targetCtx.fillText('APPROACHES', 0, 38);
    targetCtx.restore();

    targetCtx.restore();
}

function drawBossDefeatedOverlay() {
    const elapsed = 330 - bossDefeatedTimer;
    const textProgress = clamp((elapsed - 60) / 36, 0, 1);
    if (textProgress <= 0) return;

    const slideSide = bossNumber % 2 === 0 ? -1 : 1;
    const startX = slideSide < 0 ? -canvas.width * 0.4 : canvas.width * 1.4;
    const textEase = 1 - Math.pow(1 - textProgress, 3);
    const textX = startX + (canvas.width / 2 - startX) * textEase;
    const slamShake = textProgress < 0.22 ? (1 - textProgress / 0.22) * 16 : 0;

    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.translate(textX + (Math.random() - 0.5) * slamShake, canvas.height * 0.18 + (Math.random() - 0.5) * slamShake);
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#180207';
    ctx.lineWidth = 5;
    ctx.fillStyle = '#fff3f8';
    ctx.font = 'bold 64px Impact, Haettenschweiler, "Arial Black", sans-serif';
    ctx.strokeText('BOSS DEFEATED', 0, 0);
    ctx.fillText('BOSS DEFEATED', 0, 0);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = clamp((elapsed - 250) / 35, 0, 1);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 24px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`+${500 * bossNumber} BONUS`, canvas.width / 2, canvas.height * 0.26);
    ctx.restore();
}

function drawBossHud() {
    return;
}

function drawExplosionBlast(explosion) {
    if (!explosion) return;

    const progress = 1 - (explosion.life / explosion.maxLife);
    const radius = explosion.radius;
    const alpha = Math.pow(1 - progress, 1.5);

    ctx.save();
    ctx.translate(explosion.x, explosion.y);

    for (const smokeBlob of explosion.smokeBlobs) {
        const smokeDistance = smokeBlob.dist * radius * (1 + progress * 0.5);
        const smokeX = Math.cos(smokeBlob.angle) * smokeDistance;
        const smokeY = Math.sin(smokeBlob.angle) * smokeDistance;
        const smokeSize = smokeBlob.size * radius * (0.8 + progress * 0.4);
        ctx.fillStyle = `rgba(${explosion.smokeRgb}, ${alpha * 0.5})`;
        ctx.beginPath();
        ctx.arc(smokeX, smokeY, smokeSize, 0, Math.PI * 2);
        ctx.fill();
    }

    for (const blob of explosion.blobs) {
        const blobDistance = blob.dist * radius * (0.35 + progress * 0.9);
        const blobX = Math.cos(blob.angle) * blobDistance;
        const blobY = Math.sin(blob.angle) * blobDistance;
        const blobSize = blob.size * radius * (0.42 + progress * 0.2);
        const blobGrad = ctx.createRadialGradient(blobX, blobY, blobSize * 0.08, blobX, blobY, blobSize);
        const color = explosion.firePalette[blob.colorIdx];
        blobGrad.addColorStop(0, `rgba(255, 255, 220, ${alpha})`);
        blobGrad.addColorStop(0.28, `rgba(255, 230, 120, ${alpha * 0.95})`);

        if (color === '#ffdd00') {
            blobGrad.addColorStop(0.6, `rgba(255, 221, 0, ${alpha * 0.9})`);
            blobGrad.addColorStop(1, 'rgba(255, 221, 0, 0)');
        } else if (color === '#ff8800') {
            blobGrad.addColorStop(0.58, `rgba(255, 136, 0, ${alpha * 0.88})`);
            blobGrad.addColorStop(1, 'rgba(255, 136, 0, 0)');
        } else if (color === '#ff3300') {
            blobGrad.addColorStop(0.55, `rgba(255, 51, 0, ${alpha * 0.82})`);
            blobGrad.addColorStop(1, 'rgba(255, 51, 0, 0)');
        } else if (color === '#d9ff8a') {
            blobGrad.addColorStop(0.6, `rgba(217, 255, 138, ${alpha * 0.9})`);
            blobGrad.addColorStop(1, 'rgba(217, 255, 138, 0)');
        } else if (color === '#44ff44') {
            blobGrad.addColorStop(0.58, `rgba(68, 255, 68, ${alpha * 0.88})`);
            blobGrad.addColorStop(1, 'rgba(68, 255, 68, 0)');
        } else if (color === '#ffd58a') {
            blobGrad.addColorStop(0.6, `rgba(255, 213, 138, ${alpha * 0.92})`);
            blobGrad.addColorStop(1, 'rgba(255, 213, 138, 0)');
        } else if (color === '#ff5533') {
            blobGrad.addColorStop(0.58, `rgba(255, 85, 51, ${alpha * 0.88})`);
            blobGrad.addColorStop(1, 'rgba(255, 85, 51, 0)');
        } else if (color === '#ff2222') {
            blobGrad.addColorStop(0.55, `rgba(255, 34, 34, ${alpha * 0.84})`);
            blobGrad.addColorStop(1, 'rgba(255, 34, 34, 0)');
        } else {
            blobGrad.addColorStop(0.55, `rgba(204, 68, 255, ${alpha * 0.82})`);
            blobGrad.addColorStop(1, 'rgba(204, 68, 255, 0)');
        }

        ctx.fillStyle = blobGrad;
        ctx.beginPath();
        ctx.arc(blobX, blobY, blobSize, 0, Math.PI * 2);
        ctx.fill();
    }

    if (progress < 0.3) {
        const coreAlpha = 1 - progress / 0.3;
        const coreRadius = (1 - progress) * radius * 0.4;
        const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, coreRadius);
        coreGrad.addColorStop(0, `rgba(255, 255, 255, ${coreAlpha})`);
        coreGrad.addColorStop(0.45, `rgba(255, 245, 180, ${coreAlpha * 0.95})`);
        coreGrad.addColorStop(1, `rgba(${explosion.coreOuterRgb}, 0)`);
        ctx.fillStyle = coreGrad;
        ctx.beginPath();
        ctx.arc(0, 0, coreRadius, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

function drawArcadeScanlines(alpha) {
    ctx.save();
    ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
    for (let y = 0; y < canvas.height; y += 3) {
        ctx.fillRect(0, y, canvas.width, 1);
    }
    ctx.restore();
}

function drawNeonBracket(x, y, w, h, size, color, lw) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
    ctx.beginPath();
    // top-left
    ctx.moveTo(x, y + size); ctx.lineTo(x, y); ctx.lineTo(x + size, y);
    // top-right
    ctx.moveTo(x + w - size, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + size);
    // bottom-right
    ctx.moveTo(x + w, y + h - size); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w - size, y + h);
    // bottom-left
    ctx.moveTo(x + size, y + h); ctx.lineTo(x, y + h); ctx.lineTo(x, y + h - size);
    ctx.stroke();
    ctx.restore();
}

// Compute (and cache) the alpha content bounding box of an image as fractions
// 0..1 of its natural size. Lets us anchor a portrait by its visible pixels
// instead of the image frame, so busts and full-body figures both sit on the
// nameplate without floating or being cut off.
function getContentBox(img) {
    if (img._contentBox) return img._contentBox;
    if (!img.complete || !img.naturalWidth) return null;
    try {
        const nw = img.naturalWidth, nh = img.naturalHeight;
        const scale = Math.min(1, 256 / Math.max(nw, nh));
        const sw = Math.max(1, Math.round(nw * scale));
        const sh = Math.max(1, Math.round(nh * scale));
        const oc = document.createElement('canvas');
        oc.width = sw; oc.height = sh;
        const octx = oc.getContext('2d', { willReadFrequently: true });
        octx.drawImage(img, 0, 0, sw, sh);
        const data = octx.getImageData(0, 0, sw, sh).data;
        let minX = sw, minY = sh, maxX = -1, maxY = -1;
        for (let y = 0; y < sh; y++) {
            for (let x = 0; x < sw; x++) {
                if (data[(y * sw + x) * 4 + 3] > 12) {
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                }
            }
        }
        if (maxX < 0) { img._contentBox = { l: 0, t: 0, r: 1, b: 1 }; return img._contentBox; }
        img._contentBox = { l: minX / sw, t: minY / sh, r: (maxX + 1) / sw, b: (maxY + 1) / sh };
        return img._contentBox;
    } catch (e) {
        return null;
    }
}

function drawCharacterSelectScreen() {
    const time = frameCount * 0.016;
    const cx = canvas.width / 2;
    characterCardRects = [];

    // CRT backdrop
    ctx.save();
    ctx.fillStyle = 'rgba(2, 5, 14, 0.78)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const vignette = ctx.createRadialGradient(cx, canvas.height * 0.46, Math.min(canvas.width, canvas.height) * 0.1, cx, canvas.height * 0.5, Math.max(canvas.width, canvas.height) * 0.7);
    vignette.addColorStop(0, 'rgba(24, 50, 96, 0.16)');
    vignette.addColorStop(0.55, 'rgba(6, 12, 30, 0.45)');
    vignette.addColorStop(1, 'rgba(0, 0, 0, 0.9)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // ---- Marquee header ----
    const headY = canvas.height * 0.115;
    const headSize = Math.max(30, Math.min(canvas.width * 0.058, 80));
    ctx.save();
    ctx.font = `900 ${headSize}px Impact, Haettenschweiler, "Arial Black", sans-serif`;
    ctx.lineWidth = Math.max(3, headSize * 0.08);
    ctx.strokeStyle = '#06203a';
    ctx.strokeText('ADVENTURES IN SPACE', cx, headY);
    const headGrad = ctx.createLinearGradient(0, headY - headSize * 0.6, 0, headY + headSize * 0.6);
    headGrad.addColorStop(0, '#fff7c4');
    headGrad.addColorStop(0.5, '#ffd35e');
    headGrad.addColorStop(1, '#ff9d2e');
    ctx.shadowColor = 'rgba(255, 190, 70, 0.8)';
    ctx.shadowBlur = 26;
    ctx.fillStyle = headGrad;
    ctx.fillText('ADVENTURES IN SPACE', cx, headY);
    ctx.restore();

    // PLAYER SELECT banner
    const banY = headY + headSize * 0.72;
    const banText = 'PLAYER SELECT';
    ctx.font = `bold ${Math.max(13, Math.min(canvas.width * 0.016, 22))}px "Courier New", monospace`;
    const banW = ctx.measureText(banText).width + 46;
    ctx.save();
    ctx.fillStyle = 'rgba(8, 20, 42, 0.85)';
    ctx.strokeStyle = 'rgba(120, 220, 255, 0.6)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(90, 200, 255, 0.6)';
    ctx.shadowBlur = 14;
    const banH = Math.max(22, Math.min(canvas.height * 0.05, 34));
    ctx.beginPath();
    ctx.rect(cx - banW / 2, banY - banH / 2, banW, banH);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#9fe3ff';
    ctx.fillText(banText, cx, banY + 1);
    ctx.restore();

    // ---- Character roster ----
    const cardCenterY = canvas.height * 0.55;
    const boxW = Math.min(canvas.width * 0.40, 430);
    const boxH = Math.min(canvas.height * 0.52, 470);
    const cardXs = [canvas.width * 0.28, canvas.width * 0.72];
    const accents = [[255, 196, 84], [120, 226, 255]]; // Doof amber, Devyn cyan
    const accentHex = ['#ffc454', '#78e2ff'];

    function roundRect(x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
    }

    for (let i = 0; i < CHARACTER_ORDER.length; i++) {
        const charDef = CHARACTERS[CHARACTER_ORDER[i]];
        const isSelected = i === characterSelectChoice;
        const ac = accents[i];
        const acStr = `rgba(${ac[0]}, ${ac[1]}, ${ac[2]}`;
        const ccx = cardXs[i];

        // record tap/click rect (screen space)
        characterCardRects.push({ x: ccx - boxW / 2, y: cardCenterY - boxH / 2, w: boxW, h: boxH, index: i });

        const pulse = isSelected ? 1 + Math.sin(time * 3.2) * 0.02 : 1;
        ctx.save();
        ctx.translate(ccx, cardCenterY);
        ctx.scale(pulse, pulse);
        const bx = -boxW / 2;
        const by = -boxH / 2;

        // Card body
        roundRect(bx, by, boxW, boxH, 18);
        if (isSelected) { ctx.shadowColor = `${acStr}, 0.9)`; ctx.shadowBlur = 38; }
        const cardGrad = ctx.createLinearGradient(bx, by, bx, by + boxH);
        cardGrad.addColorStop(0, isSelected ? 'rgba(18, 32, 60, 0.96)' : 'rgba(9, 15, 30, 0.82)');
        cardGrad.addColorStop(1, isSelected ? 'rgba(8, 16, 36, 0.96)' : 'rgba(4, 8, 18, 0.82)');
        ctx.fillStyle = cardGrad;
        ctx.fill();
        ctx.shadowBlur = 0;

        // Inner scanlines on the panel
        ctx.save();
        roundRect(bx + 4, by + 4, boxW - 8, boxH - 8, 14);
        ctx.clip();
        ctx.fillStyle = `${acStr}, 0.05)`;
        for (let y = by + 6; y < by + boxH; y += 4) ctx.fillRect(bx, y, boxW, 1);
        ctx.restore();

        // Portrait, anchored by its *visible* pixels (not the image frame) so a
        // bust (Doof) and a full-body figure (Devyn) both sit on the nameplate.
        const portrait = charDef.portrait;
        const pad = boxW * 0.07;
        const nameplateH = boxH * 0.135;
        const innerW = boxW - pad * 2;
        const portraitTop = by + pad;
        // Content bottom lands exactly on the nameplate's top edge.
        const baseline = by + boxH - nameplateH;
        const availH = baseline - portraitTop;
        if (portrait.complete && portrait.naturalWidth > 0) {
            const nW = portrait.naturalWidth, nH = portrait.naturalHeight;
            const box = getContentBox(portrait);
            const cL = (box ? box.l : 0) * nW;
            const cR = (box ? box.r : 1) * nW;
            const cB = (box ? box.b : 1) * nH;
            const contentW = Math.max(1, cR - cL);
            const contentH = Math.max(1, cB - (box ? box.t : 0) * nH);
            const fit = Math.min(innerW / contentW, availH / contentH);
            const dW = nW * fit, dH = nH * fit;
            // Horizontally center the visible content; sit its bottom on baseline.
            const drawX = -((cL + cR) / 2) * fit;
            const drawY = baseline - cB * fit;
            ctx.save();
            roundRect(bx + pad * 0.5, by + pad * 0.5, boxW - pad, boxH - pad, 12);
            ctx.clip();
            if (!isSelected) ctx.globalAlpha = 0.6;
            ctx.drawImage(portrait, drawX, drawY, dW, dH);
            ctx.restore();
        }
        if (!isSelected) {
            // dim unselected with a cool tint
            ctx.save();
            roundRect(bx, by, boxW, boxH, 18);
            ctx.clip();
            ctx.fillStyle = 'rgba(4, 8, 20, 0.4)';
            ctx.fillRect(bx, by, boxW, boxH);
            ctx.restore();
        }

        // Base border
        roundRect(bx, by, boxW, boxH, 18);
        ctx.lineWidth = 2;
        ctx.strokeStyle = isSelected ? `${acStr}, 0.95)` : 'rgba(110, 150, 200, 0.3)';
        ctx.stroke();

        // Nameplate bar
        const plateH = boxH * 0.135;
        const plateY = by + boxH - plateH;
        ctx.save();
        roundRect(bx, plateY, boxW, plateH, 12);
        ctx.clip();
        const plateGrad = ctx.createLinearGradient(bx, plateY, bx, plateY + plateH);
        plateGrad.addColorStop(0, isSelected ? `${acStr}, 0.92)` : 'rgba(20, 30, 52, 0.85)');
        plateGrad.addColorStop(1, isSelected ? `${acStr}, 0.65)` : 'rgba(12, 20, 38, 0.85)');
        ctx.fillStyle = plateGrad;
        ctx.fillRect(bx, plateY, boxW, plateH);
        ctx.restore();
        ctx.font = `900 ${Math.max(20, Math.min(boxW * 0.13, 44))}px Impact, Haettenschweiler, "Arial Black", sans-serif`;
        ctx.fillStyle = isSelected ? '#10203a' : 'rgba(190, 210, 240, 0.75)';
        ctx.textAlign = 'center';
        ctx.fillText(charDef.name.toUpperCase(), 0, plateY + plateH / 2 + 2);

        // Animated neon selection brackets + "1P" tag
        if (isSelected) {
            const off = 6 + Math.sin(time * 4) * 3;
            drawNeonBracket(bx - off, by - off, boxW + off * 2, boxH + off * 2,
                Math.min(boxW, boxH) * 0.22, `${acStr}, 0.95)`, 5);
            // 1P flag
            ctx.save();
            ctx.translate(bx + 6, by + 6);
            ctx.fillStyle = `${acStr}, 0.95)`;
            ctx.shadowColor = `${acStr}, 0.8)`;
            ctx.shadowBlur = 12;
            const tagW = 52, tagH = 26;
            ctx.fillRect(0, 0, tagW, tagH);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#08152c';
            ctx.font = 'bold 16px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('1P', tagW / 2, tagH / 2 + 1);
            ctx.restore();
        }
        ctx.restore();
    }

    // ---- Blinking start prompt ----
    const blink = (Math.sin(time * 5) > -0.3);
    if (blink) {
        const prompt = touchEnabled ? 'TAP A HERO TO START' : 'CLICK A HERO OR PRESS SPACE';
        ctx.font = `bold ${Math.max(18, Math.min(canvas.width * 0.024, 32))}px "Courier New", monospace`;
        ctx.fillStyle = '#ffe066';
        ctx.shadowColor = 'rgba(255, 210, 90, 0.8)';
        ctx.shadowBlur = 16;
        ctx.fillText(prompt, cx, canvas.height * 0.9);
        ctx.shadowBlur = 0;
    }
    // arcade flavor corners
    ctx.font = `${Math.max(11, Math.min(canvas.width * 0.013, 16))}px "Courier New", monospace`;
    ctx.fillStyle = 'rgba(150, 200, 255, 0.6)';
    ctx.textAlign = 'left';
    ctx.fillText('CREDIT 00', canvas.width * 0.04, canvas.height * 0.94);
    ctx.textAlign = 'right';
    ctx.fillText(touchEnabled ? 'TAP TO SELECT' : '◄ ►  MOVE', canvas.width * 0.96, canvas.height * 0.94);

    drawArcadeScanlines(0.12);
    ctx.restore();
}

function drawTitleScreen() {
    const time = frameCount * 0.016;
    const portraitSize = Math.min(canvas.height * 0.78, canvas.width * 0.46);
    const portraitScale = 1 + Math.sin(time * 1.0) * 0.025;
    const portraitCenterX = canvas.width * 0.75;
    const portraitCenterY = canvas.height * 0.5;
    const portraitX = portraitCenterX - portraitSize / 2;
    const portraitY = portraitCenterY - portraitSize / 2;
    const maskedPortrait = ensureTitlePortraitCache(portraitSize, portraitSize);
    const nebulaDriftX = Math.sin(time * 0.4) * 14;
    const nebulaDriftY = Math.cos(time * 0.3) * 12;

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const nebulaLeft = ctx.createRadialGradient(
        canvas.width * 0.26,
        canvas.height * 0.44,
        0,
        canvas.width * 0.26,
        canvas.height * 0.44,
        canvas.height * 0.48
    );
    nebulaLeft.addColorStop(0, 'rgba(130, 90, 255, 0.3)');
    nebulaLeft.addColorStop(0.45, 'rgba(80, 30, 180, 0.14)');
    nebulaLeft.addColorStop(1, 'rgba(20, 10, 60, 0)');
    ctx.fillStyle = nebulaLeft;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const nebulaRight = ctx.createRadialGradient(
        portraitCenterX + nebulaDriftX,
        portraitCenterY + nebulaDriftY,
        0,
        portraitCenterX + nebulaDriftX,
        portraitCenterY + nebulaDriftY,
        portraitSize * 0.92
    );
    nebulaRight.addColorStop(0, 'rgba(90, 210, 255, 0.4)');
    nebulaRight.addColorStop(0.42, 'rgba(50, 120, 220, 0.2)');
    nebulaRight.addColorStop(0.72, 'rgba(120, 60, 220, 0.14)');
    nebulaRight.addColorStop(1, 'rgba(8, 20, 40, 0)');
    ctx.fillStyle = nebulaRight;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    const backlight = ctx.createRadialGradient(
        portraitCenterX,
        portraitCenterY,
        portraitSize * 0.1,
        portraitCenterX,
        portraitCenterY,
        portraitSize * 0.74
    );
    backlight.addColorStop(0, 'rgba(180, 245, 255, 0.46)');
    backlight.addColorStop(0.32, 'rgba(90, 170, 255, 0.28)');
    backlight.addColorStop(0.68, 'rgba(110, 65, 220, 0.14)');
    backlight.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = backlight;
    ctx.beginPath();
    ctx.arc(portraitCenterX, portraitCenterY, portraitSize * 0.78, 0, Math.PI * 2);
    ctx.fill();

    for (const star of titleStars) {
        let twinkle;
        if (star.mode === 'flash') {
            // Dramatic flash: mostly dim, occasionally flares bright
            const cycle = ((time + star.phase) % star.flashInterval) / star.flashInterval;
            const flash = cycle < 0.12 ? Math.pow(Math.sin(cycle / 0.12 * Math.PI), 2) : 0;
            twinkle = star.alpha * (0.15 + flash * 0.85);
        } else if (star.mode === 'sparkle') {
            // Rapid flicker — staccato twinkle
            const flicker = Math.sin(time * star.speed * 3 + star.phase) * Math.sin(time * star.speed * 1.7 + star.phase * 2);
            twinkle = star.alpha * (0.2 + (flicker + 1) * 0.4);
        } else {
            // Gentle pulse (original behavior)
            twinkle = star.alpha * (0.3 + (Math.sin(time * star.speed + star.phase) + 1) * 0.35);
        }
        const armLength = star.size * (0.6 + twinkle * 1.2);
        ctx.strokeStyle = `rgba(${star.tint}, ${twinkle})`;
        ctx.lineWidth = star.size > 5 ? 1.8 : 1.2;
        ctx.beginPath();
        ctx.moveTo(star.x - armLength, star.y);
        ctx.lineTo(star.x + armLength, star.y);
        ctx.moveTo(star.x, star.y - armLength);
        ctx.lineTo(star.x, star.y + armLength);
        ctx.stroke();
        // Bright core glow on flash
        const coreAlpha = Math.min(1, twinkle * 1.2 + 0.05);
        const coreR = star.coreSize * (1 + twinkle * 0.5);
        ctx.fillStyle = `rgba(255, 255, 255, ${coreAlpha})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, coreR, 0, Math.PI * 2);
        ctx.fill();
    }

    if (maskedPortrait) {
        const portraitGlow = ensurePortraitGlowCache(maskedPortrait, portraitSize);
        if (portraitGlow) {
            ctx.save();
            ctx.translate(portraitCenterX, portraitCenterY);
            ctx.scale(portraitScale, portraitScale);
            ctx.drawImage(
                portraitGlow,
                -portraitSize / 2 - TITLE_PORTRAIT_GLOW_PADDING,
                -portraitSize / 2 - TITLE_PORTRAIT_GLOW_PADDING
            );
            ctx.restore();
        }
    }

    const titleFloat = Math.sin(time * 2.0) * 8;
    const mainTitleSize = Math.max(78, canvas.width * 0.12);
    const subTitleSize = Math.max(50, mainTitleSize * 0.54);
    const kickerSize = Math.max(18, canvas.width * 0.017);
    const titleX = canvas.width * 0.25;
    const titleY = canvas.height * 0.38 + titleFloat;
    const kickerY = titleY + mainTitleSize * 0.72;
    const promptY = Math.min(canvas.height * 0.76, kickerY + subTitleSize * 1.1);
    const promptAlpha = 0.4 + (Math.sin(time * 4.2) + 1) * 0.3;

    const titleAreaWidth = Math.min(canvas.width * 0.44, portraitX - canvas.width * 0.06);
    const titleAreaHeight = mainTitleSize * 1.95;
    const titleAreaX = titleX - titleAreaWidth / 2;
    const titleAreaY = titleY - mainTitleSize * 1.02;
    const titleTextCanvas = renderTitleTextCanvas(titleAreaWidth, titleAreaHeight, mainTitleSize, subTitleSize, kickerSize, time);
    drawPixelCanvas(titleTextCanvas, titleAreaX, titleAreaY, titleAreaWidth, titleAreaHeight, 'rgba(110, 225, 255, 0.85)', 24, 0.72);

    const promptSize = Math.max(24, canvas.width * 0.028);
    const hintSize = Math.max(15, canvas.width * 0.015);
    const promptAreaWidth = titleAreaWidth * 1.04;
    const promptAreaHeight = Math.max(promptSize * 2.1, canvas.height * 0.12);
    const promptAreaX = titleX - promptAreaWidth / 2;
    const promptAreaY = promptY - promptSize * 0.72;
    const promptCanvas = renderTitlePromptCanvas(promptAreaWidth, promptAreaHeight, promptSize, hintSize, time);
    drawPixelCanvas(promptCanvas, promptAreaX, promptAreaY, promptAreaWidth, promptAreaHeight, `rgba(110, 225, 255, ${Math.min(0.9, promptAlpha)})`, 20, promptAlpha);

    ctx.imageSmoothingEnabled = true;
}
